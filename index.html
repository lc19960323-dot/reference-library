// Lightweight PDF metadata extraction for batch mode
async function extractPdfMetadata(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

  let fullText = '';
  const pagesToRead = Math.min(pdf.numPages, 3);
  for (let i = 1; i <= pagesToRead; i++) {
    const pg = await pdf.getPage(i);
    const tc = await pg.getTextContent();
    let pageText = '';
    for (const item of tc.items) {
      pageText += item.str;
      if (item.hasEOL) pageText += '\n';
    }
    fullText += pageText + '\n\n';
  }

  // Try PDF metadata first
  let result = {};
  try {
    const meta = await pdf.getMetadata();
    const info = meta?.info || {};
    if (info.Title) result.title = info.Title;
    if (info.Author) result.authors = info.Author;
  } catch(e) {}

  // Basic extraction
  if (!result.title) {
    const titleMatch = fullText.match(/^[\s]*([^\n]{5,100})/);
    if (titleMatch) result.title = titleMatch[1].trim();
  }
  if (!result.year) {
    const yearMatch = fullText.match(/(?:19|20)\d{2}/);
    if (yearMatch) result.year = yearMatch[0];
  }
  if (!result.authors) {
    const authorMatch = fullText.match(/(?:作者|Author|By)[：:]\s*([^\n]{2,80})/i);
    if (authorMatch) result.authors = authorMatch[1].trim();
  }

  return result;
}

async function processPdf(file) {
  const progress = document.getElementById('pdfProgress');
  const progressText = document.getElementById('pdfProgressText');
  const progressFill = document.getElementById('pdfProgressFill');
  if (!progress) return;

  progress.classList.add('show');
  progressText.textContent = '正在读取 PDF...';
  progressFill.style.width = '10%';

  try {
    const arrayBuffer = await file.arrayBuffer();
    progressText.textContent = '正在解析 PDF 内容...';
    progressFill.style.width = '20%';

    const pdfjsLib = await loadPdfJs();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

    // Extract text lines from first page (with position info)
    progressText.textContent = '正在提取文本...';
    progressFill.style.width = '40%';

    const page1 = await pdf.getPage(1);
    const tc1 = await page1.getTextContent();

    // Build structured lines: group text items by Y-coordinate
    const items = tc1.items.filter(it => it.str && it.str.trim()).sort((a, b) => b.transform[5] - a.transform[5] || a.transform[4] - b.transform[4]);
    const pageLines = [];
    let cur = null;
    for (const it of items) {
      const y = Math.round(it.transform[5]);
      if (!cur || Math.abs(y - cur.y) > 2) {
        if (cur) pageLines.push(cur);
        cur = { y, text: cleanPdfText(it.str.trim()), fontSize: Math.abs(it.transform[3] || 12) };
      } else {
        cur.text += cleanPdfText(' ' + it.str.trim());
      }
    }
    if (cur) pageLines.push(cur);
    // Also clean the assembled line text
    for (const pl of pageLines) pl.text = cleanPdfText(pl.text);

    // Full text from first 3 pages + last page for regex-based extraction
    // IMPORTANT: preserve line breaks using hasEOL — abstract/keywords regexes
    // depend on \n before section markers (摘要\n关键词) to work correctly
    let fullText = '';
    const pagesToRead = Math.min(pdf.numPages, 3);
    for (let i = 1; i <= pagesToRead; i++) {
      const pg = await pdf.getPage(i);
      const tc = await pg.getTextContent();
      let pageText = '';
      for (const it of tc.items) {
        if (it.str) {
          pageText += it.str;
          if (it.hasEOL) pageText += '\n';
          else pageText += ' ';
        }
      }
      fullText += cleanPdfText(pageText) + '\n\n';
    }
    // Also read last page for ending page number and publication info
    if (pdf.numPages > pagesToRead) {
      try {
        const lastPg = await pdf.getPage(pdf.numPages);
        const lastTc = await lastPg.getTextContent();
        let lastPageText = '';
        for (const it of lastTc.items) {
          if (it.str) {
            lastPageText += it.str;
            if (it.hasEOL) lastPageText += '\n';
            else lastPageText += ' ';
          }
        }
        fullText += cleanPdfText(lastPageText) + '\n\n';
      } catch(e) {}
    }

    progressText.textContent = '正在智能识别...';
    progressFill.style.width = '60%';

    // Smart pre-fill: combine structural + regex + PDF metadata
    const prefill = await smartPrefillPdf(pageLines, fullText, pdf);

    progressFill.style.width = '90%';

    showPdfPickerPanel(pageLines, prefill);

    progressFill.style.width = '100%';
    progressFill.style.background = '#22c55e';
    progressText.textContent = '✅ PDF 文本已提取并预填';

    showToast('请在面板中确认/修正预填信息，或用DOI/标题搜索', 'success');

  } catch(e) {
    console.error('PDF parse error:', e);
    progressText.textContent = '❌ PDF 解析失败: ' + e.message;
    progressFill.style.background = '#ef4444';
    showToast('PDF 解析失败，请手动填写信息', 'error');
  }
}

// ========== Smart Pre-fill Algorithm (v2: Academic Format Aware) ==========

// Affiliation detection patterns (comprehensive, Chinese + English)
const AFFILIATION_PATTERNS = /(?:大学|学院|研究院|研究所|研究室|实验室|研究中心|学系|教研室|学部|校|医院|公司|集团|出版社|报社|杂志社|期刊|编辑部|博物馆|图书馆|档案馆|Department|Faculty|Institute|Laborator|University|College|School\s+of|Center\s+for|Centre\s+for|Academ|Hospital|Press|Publisher|Editorial|Museum|Archive|Library|Corp|Inc\.|Ltd|LLC)/i;

// Section marker patterns (Chinese + English)
const SECTION_MARKERS = {
  abstract: /^(摘\s*要|内容摘要|论文摘要|摘\s+要|Abstract|ABSTRACT|ABSTRACT)\s*[：:]?\s*/i,
  keywords: /^(关键词|关\s*键\s*词|Key\s*words?|Keywords?|KEY\s*WORDS)\s*[：:]?\s*/i,
  intro:    /^(1\.?\s*(?:Introduction|引言|INTRODUCTION|绪论|导论)|Introduction|INTRODUCTION|引言|前言|前\s*言|1\s+Introduction)\b/i,
  clc:      /^(中图分类号|文献标识码|文章编号|CLC\s*Number|收稿日期|基金项目)/i,
  doi:      /^(DOI|doi)\s*[：:]?/i,
  received: /^(Received|Accepted|收稿日期|修回日期)\s*[：:]?/i,
};

// Sentence markers for rejecting text that looks like abstract/sentence (not author names)
const sentenceMarkersForPdf = /^(摘\s*要|内容摘要|论文摘要|Abstract|ABSTRACT|本文|本研究|我们|文章|该文|旨在|探讨|分析|研究|论述|考察|基于|通过|从|以|在|随着|对于|针对|鉴于)/i;

// Check if a line looks like author names
// Key insight: author names are SHORT (2-4 chars per Chinese name, 2-3 words per Western name)
// Abstracts, sentences, paragraphs are LONG — they should NEVER be detected as authors
function isAuthorLine(text) {
  const t = text.trim();
  if (t.length === 0) return false;

  // === HARD REJECT: anything that looks like a sentence or abstract ===
  // 1. Too long — author names for a single paper should NEVER exceed 150 chars
  //    (even 5 authors × 15 chars each = 75 chars max)
  if (t.length > 150) return false;

  // 2. Contains abstract/sentence markers
  const sentenceMarkers = /^(摘\s*要|内容摘要|论文摘要|Abstract|ABSTRACT|本文|本研究|我们|文章|该文|旨在|探讨|分析|研究|论述|考察|基于|通过|从|以|在|随着|对于|针对|鉴于|此|其|这|那|那些|这些|一方面|另一方面|不仅|而且|然而|但是|因此|所以|总的来说|综上所述|总而言之|换言之|事实上|实际上|结果显示|数据表明|研究发现)/i;
  if (sentenceMarkers.test(t)) return false;

  // 3. Contains sentence-ending punctuation in the middle (。！？)
  if (/[。！？]/.test(t)) return false;

  // 4. Contains too many Chinese sentence particles (的、了、是、有、在、为、与、对、将、被、把、让、给、到、从、向、于、而、则、也、还、又、再、已、曾、刚、正、将)
  const particlePattern = /[的了是在为与对将被把让给到从向于而则也还又再已曾刚正将]$/;
  // Chinese sentence internal structure: lots of 的, 了, 是 etc
  const cnParticleCount = (t.match(/[的了是在有与对将被让给到从向于而则也还又]/g) || []).length;
  const cnCharCount = (t.match(/[\u4e00-\u9fff]/g) || []).length;
  if (cnCharCount > 10 && cnParticleCount / cnCharCount > 0.15) return false;

  // 5. Ends with a period and is more than 30 chars (a sentence, not a name)
  if (t.length > 30 && /[.。]\s*$/.test(t)) return false;

  // 6. Has more than 15 Chinese chars in a continuous run (likely a sentence fragment)
  const longChineseRun = t.match(/[\u4e00-\u9fff]{15,}/);
  if (longChineseRun) return false;

  // === Reject affiliations ===
  if (AFFILIATION_PATTERNS.test(t)) return false;
  // Reject emails/URLs
  if (/@/.test(t) || /^https?:/i.test(t)) return false;
  // Reject section markers
  for (const key in SECTION_MARKERS) {
    if (SECTION_MARKERS[key].test(t)) return false;
  }

  // === POSITIVE CHECK: does this look like a list of names? ===

  // Chinese author names: typically 2-3 characters each (rarely 4), separated by 、，, or spaces
  // Pattern: "张三、李四、王五" or "张三 李四" or "张三1 李四2"
  // Key: each individual name is 2-4 chars, and the total line is relatively short
  const chineseNames = t.match(/[\u4e00-\u9fff]{2,4}/g) || [];
  // Western author names: "John Smith", "J.K. Rowling", "Smith, J."
  const westernNames = t.match(/[A-Z][a-z]+\s+[A-Z][a-z]+/g) || [];
  const westernInitialNames = t.match(/[A-Z]\.\s*[A-Z][a-z]+/g) || [];
  const westernLastFirst = t.match(/[A-Z][a-z]+,\s*[A-Z]\.[A-Z]?/g) || [];

  const hasChineseNames = chineseNames.length >= 1;
  const hasWesternNames = westernNames.length >= 1 || westernInitialNames.length >= 1 || westernLastFirst.length >= 1;

  if (!hasChineseNames && !hasWesternNames) return false;

  // === Final validation: name-like characteristics ===
  if (hasChineseNames) {
    const cnRatio = cnCharCount / t.replace(/\s/g, '').length;
    // Chinese names should dominate the line (≥50% Chinese chars)
    // and the line should be short (≤60 chars for a name line)
    if (cnRatio >= 0.5 && t.length <= 60) {
      // Verify: the Chinese sequences are name-like (not abstract fragments)
      // A name: 2-3 chars, no sentence particles inside
      // Count how many name-like sequences vs total Chinese sequences
      const nameLikeSeqs = chineseNames.filter(name => {
        // Reject sequences that contain common sentence particles
        return !/[的了是在有与对将被让给到从向于而则也还又]/.test(name);
      });
      if (nameLikeSeqs.length >= 1 && nameLikeSeqs.length / chineseNames.length >= 0.7) {
        // Verify: punctuation between names is name-separator type (、，,) not sentence type (。；：)
        const punctCount = (t.match(/[、，,;]/g) || []).length;
        if (punctCount <= chineseNames.length + 2) return true;
      }
    }
    // Allow slightly longer for Western-Chinese mixed author lists
    if (cnRatio >= 0.4 && t.length <= 80 && hasWesternNames) return true;
  }

  if (hasWesternNames) {
    // Western name line should be ≤100 chars (3-4 authors max)
    if (t.length <= 100) {
      // Verify: not too many words (a sentence has many words, names have few)
      const wordCount = (t.match(/\s+/g) || []).length + 1;
      if (wordCount <= 12) return true;
    }
  }

  return false;
}

// Check if a line looks like a journal/source name
function isJournalLine(text) {
  const t = text.trim();
  if (!t || t.length > 100) return false;

  // Chinese journal 《xxx》
  if (/《[\u4e00-\u9fff\w]+》/.test(t)) return true;
  // English journal patterns
  if (/^(Proceedings of|[A-Z][A-Za-z\s&]*(?:Journal|Proceedings|Conference|Review|Letters|Transactions|Magazine|Studies|Quarterly|Annals|Bulletin|Forum|Routledge|Cambridge|Oxford))/i.test(t)) return true;
  // Bottom-of-page journal info: "期刊名, 2023, 37(2): 145-158"
  if (/^[\u4e00-\u9fff]{2,20}[，,\s]*\d{4}/.test(t) && !AFFILIATION_PATTERNS.test(t)) return true;

  return false;
}

// Convert Chinese numerals to Arabic number (e.g., 三十三 → 33)
function chineseToNumber(cn) {
  if (!cn) return 0;
  const digitMap = { '〇': 0, '零': 0, '一': 1, '二': 2, '兩': 2, '三': 3, '四': 4, '五': 5, '六': 6, '七': 7, '八': 8, '九': 9 };
  const unitMap = { '十': 10, '百': 100, '千': 1000 };
  let result = 0;
  let temp = 0;
  for (const ch of cn) {
    if (digitMap[ch] !== undefined) {
      temp = digitMap[ch];
    } else if (unitMap[ch] !== undefined) {
      if (temp === 0) temp = 1; // handle 十X → 10+X
      result += temp * unitMap[ch];
      temp = 0;
    }
  }
  result += temp;
  return result;
}

async function smartPrefillPdf(pageLines, fullText, pdf) {
  const result = {
    title: '', authors: '', journal: '', year: '',
    volume: '', issue: '', pages: '', doi: '',
    abstract: '', keywords: '', type: 'article',
    lineRoles: {}
  };

  // === STEP 1: Regex extraction from full text ===

  // DOI (improved: handle Chinese punctuation)
  const doiMatch = fullText.match(/(?:DOI|doi|https?:\/\/doi\.org)[:\s]*(10\.\d{4,}\/[^\s,;）》\u3000]+)/i);
  if (doiMatch) result.doi = doiMatch[1].trim();

  // Year
  const currentYear = new Date().getFullYear();
  const yearCandidates = [];
  const yearRegex1 = /(?:©|copyright|published|accepted|出版|发表|印刷)[:\s]*(\d{4})/gi;
  for (const m of [...fullText.matchAll(yearRegex1)]) {
    const y = m[1];
    if (parseInt(y) >= 1900 && parseInt(y) <= currentYear + 1) yearCandidates.push(y);
  }
  if (yearCandidates.length === 0) {
    const yearRegex2 = /\b((?:19|20)\d{2})\b/g;
    for (const m of [...fullText.matchAll(yearRegex2)]) {
      const y = m[1];
      if (parseInt(y) >= 1900 && parseInt(y) <= currentYear + 1) yearCandidates.push(y);
    }
  }
  if (yearCandidates.length > 0) result.year = yearCandidates[yearCandidates.length - 1];

  // Abstract (improved: handle 摘 要, 摘  要 with spaces, colon variants, and Traditional Chinese 關鍵詞)
  // Also handle cases where hasEOL wasn't set and text is space-separated
  // KW = 关键词(simplified) | 關鍵詞(traditional) — reuse in all patterns
  const KW = '关键词|关\\s*键\\s*词|關鍵詞|關\\s*鍵\\s*詞';
  const CLC = '中图分类号|文獻標識碼|文献标识码|文章编号|CLC';
  const abstractPatterns = [
    new RegExp(`(?:摘\\s*要|内容摘要|论文摘要|內容摘要|論文摘要)\\s*[：:]\\s*([\\s\\S]{30,3000}?)(?=\\n\\s*(?:${KW}|Key\\s*words?|Keywords?|${CLC}|1\\.?\\s*(?:Introduction|引言|INTRODUCTION)|引言))`, 'i'),
    new RegExp(`(?:摘\\s*要|内容摘要|论文摘要|內容摘要|論文摘要)\\s*[：:]\\s*([\\s\\S]{30,3000}?)(?=\\s+(?:${KW}|Key\\s*words?|Keywords?|${CLC}))`, 'i'),
    /(?:Abstract|ABSTRACT)\s*[：:]?\s*\n?([\s\S]{30,3000}?)(?=\n\s*(?:Keywords?|Key\s*words?|1\.?\s*Introduction|1\s+Introduction|Introduction))/i,
    /(?:Abstract|ABSTRACT)\s*[：:]?\s*([\s\S]{30,3000}?)(?=\s+(?:Keywords?|Key\s*words?|1\.?\s*Introduction))/i,
    new RegExp(`(?:摘\\s*要|内容摘要|论文摘要|內容摘要|論文摘要)\\s*\\n([\\s\\S]{30,3000}?)(?=\\n\\s*(?:${KW}|Key\\s*words?|Keywords?|${CLC}))`, 'i'),
    new RegExp(`(?:摘\\s*要|内容摘要|论文摘要|內容摘要|論文摘要)\\s*[：:]?\\s*([\\s\\S]{30,3000}?)(?=\\n\\s*(?:DOI|doi|收稿日期|收稿日期|基金项目|基金項目|文章编号|文章編號))`, 'i'),
  ];
  for (const pat of abstractPatterns) {
    const m = fullText.match(pat);
    if (m) { result.abstract = m[1].trim(); break; }
  }

  // Keywords (improved, supports Traditional Chinese 關鍵詞)
  const kwPatterns = [
    new RegExp(`(?:${KW})\\s*[：:]\\s*([\\s\\S]{5,500}?)(?=\\n\\s*(?:${CLC}|1\\.?\\s*(?:Introduction|引言|INTRODUCTION)|引言|DOI|doi|©|CLC))`, 'i'),
    new RegExp(`(?:${KW})\\s*[：:]\\s*([\\s\\S]{5,500}?)(?=\\s+(?:${CLC}|1\\.?\\s*(?:Introduction|引言|INTRODUCTION)|引言|DOI|doi|©|CLC))`, 'i'),
    /(?:Keywords?|Key\s*words?|Key Words)\s*[：:]\s*([\s\S]{5,500}?)(?=\n\s*(?:1\.?\s*Introduction|1\s+Introduction|Introduction|DOI|©))/i,
    /(?:Keywords?|Key\s*words?|Key Words)\s*[：:]\s*([\s\S]{5,500}?)(?=\s+(?:1\.?\s*Introduction|Introduction|DOI|©))/i,
    // Taiwan format: keywords on a single line, followed by newline or DOI/收稿日期 etc.
    new RegExp(`(?:${KW})\\s*[：:]\\s*([^\\n]{5,300})(?:\\n|$)`, 'i'),
    /(?:Keywords?|Key\s*words?)\s*[：:]\s*([^\n]{5,300})(?:\n|$)/i,
  ];
  for (const pat of kwPatterns) {
    const m = fullText.match(pat);
    if (m) {
      result.keywords = m[1].trim().replace(/[;；·，,\n]/g, ', ').replace(/,\s*,/g, ',').replace(/^,|,$/g, '').trim();
      break;
    }
  }

  // === Volume/Issue/Pages Extraction (Priority-ordered, context-aware) ===
  // Build first-page text for header/footer context analysis
  const firstPageText = pageLines.map(l => l.text).join('\n');

  // PRIORITY 1: Chinese citation format with full context (most reliable)
  // Supports: 《期刊》第33期（2018）：175-238  or  《期刊》33（2018）：175-238
  // Also supports Chinese numerals: 《法制史研究》第三十三期（2018）：175-238
  if (!result.volume || !result.issue || !result.pages) {
    const cnCitePatterns = [
      /《([^》]{2,30})》\s*第\s*(\d+|[一二三四五六七八九十百千零〇兩]+)\s*期\s*[（(](\d{4})(?:\.\d+)?[）)]\s*[：:]\s*(\d+\s*[-–—]\s*\d+)/,
      /《([^》]{2,30})》\s*(\d+|[一二三四五六七八九十百千零〇兩]+)\s*期\s*[（(](\d{4})(?:\.\d+)?[）)]\s*[：:]\s*(\d+\s*[-–—]\s*\d+)/,
      /《([^》]{2,30})》\s*第\s*(\d+|[一二三四五六七八九十百千零〇兩]+)\s*[（(](\d{4})(?:\.\d+)?[）)]\s*[：:]\s*(\d+\s*[-–—]\s*\d+)/,
      /《([^》]{2,30})》\s*(\d+|[一二三四五六七八九十百千零〇兩]+)\s*[（(](\d{4})(?:\.\d+)?[）)]\s*[：:]\s*(\d+\s*[-–—]\s*\d+)/,
    ];
    for (const pat of cnCitePatterns) {
      const m = fullText.match(pat);
      if (m) {
        const journalName = m[1].trim();
        if (!result.journal) result.journal = journalName;
        const numStr = m[2];
        const num = /^\d+$/.test(numStr) ? parseInt(numStr) : chineseToNumber(numStr);
        if (num > 0) {
          // If pattern contains 期 (but not 卷), only set issue — leave volume empty
          // so that autoEnrichAndReview can fill it via secondary API search (Crossref/OpenAlex)
          if (/期/.test(m[0]) && !/卷/.test(m[0])) {
            if (!result.issue) result.issue = String(num);
          } else {
            if (!result.volume) result.volume = String(num);
          }
        }
        if (!result.year) result.year = m[3];
        if (!result.pages) result.pages = m[4].replace(/\s/g, '');
        console.log('[PDF] P1 citation format:', m[0]);
        break;
      }
    }
  }

  // PRIORITY 2: Chinese 第X卷 / 第X期 (prefer first-page header area)
  // Searches first page first, then full text as fallback
  if (!result.volume || !result.issue) {
    const searchSources = [
      { label: 'firstPage', text: firstPageText },
      { label: 'fullText', text: fullText }
    ];
    for (const src of searchSources) {
      if (!result.volume) {
        const volMatches = [...src.text.matchAll(/第\s*(\d+|[一二三四五六七八九十百千零〇兩]+)\s*卷/g)];
        if (volMatches.length > 0) {
          const v = /^\d+$/.test(volMatches[0][1]) ? parseInt(volMatches[0][1]) : chineseToNumber(volMatches[0][1]);
          if (v > 0) {
            result.volume = String(v);
            console.log('[PDF] P2 vol from 第X卷 (' + src.label + '):', volMatches[0][0]);
          }
        }
      }
      if (!result.issue) {
        const issueMatches = [...src.text.matchAll(/第\s*(\d+|[一二三四五六七八九十百千零〇兩]+)\s*期/g)];
        if (issueMatches.length > 0) {
          const iss = /^\d+$/.test(issueMatches[0][1]) ? parseInt(issueMatches[0][1]) : chineseToNumber(issueMatches[0][1]);
          if (iss > 0) {
            result.issue = String(iss);
            // Do NOT assume volume = issue. Leave volume empty for secondary search.
            console.log('[PDF] P2 issue from 第X期 (' + src.label + '):', issueMatches[0][0]);
          }
        }
      }
      if (result.volume && result.issue) break;
    }
  }

  // PRIORITY 3: Western Vol./No. (first page only, then header zone of full text)
  // Only digits after Vol./No. (no more [A-Z] single-letter matches)
  // No. requires a period to avoid matching "No" in English sentences
  if (!result.volume || !result.issue) {
    const volPat = /(?:Vol\.?\s*|Volume\s*)\s*(\d+)/gi;
    const noPat  = /(?:No\.\s*|Issue\s+|Number\s+)\s*(\d+)/gi;
    // Try first page first
    const fpVol = [...firstPageText.matchAll(volPat)];
    const fpNo  = [...firstPageText.matchAll(noPat)];
    if (fpVol.length > 0 && !result.volume) {
      result.volume = fpVol[0][1];
      console.log('[PDF] P3 vol from Vol. (first page):', fpVol[0][0]);
    }
    if (fpNo.length > 0 && !result.issue) {
      result.issue = fpNo[0][1];
      console.log('[PDF] P3 issue from No. (first page):', fpNo[0][0]);
    }
    // Fallback: header zone (first 30%) of full text
    if (!result.volume || !result.issue) {
      const headerZone = Math.floor(fullText.length * 0.3);
      const ftVol = [...fullText.matchAll(volPat)].filter(m => m.index < headerZone);
      const ftNo  = [...fullText.matchAll(noPat)].filter(m => m.index < headerZone);
      if (ftVol.length > 0 && !result.volume) {
        result.volume = ftVol[0][1];
        console.log('[PDF] P3 vol from Vol. (header zone):', ftVol[0][0]);
      }
      if (ftNo.length > 0 && !result.issue) {
        result.issue = ftNo[0][1];
        console.log('[PDF] P3 issue from No. (header zone):', ftNo[0][0]);
      }
    }
  }

  // PRIORITY 4: Western pages format (pp. X-Y)
  if (!result.pages) {
    const pagesMatch = fullText.match(/(?:pp\.?\s*|pages\s*)\s*(\d+\s*[-–—]\s*\d+)/i);
    if (pagesMatch) {
      result.pages = pagesMatch[1].replace(/\s/g, '');
      console.log('[PDF] P4 pages from pp.:', pagesMatch[0]);
    }
  }

  // PRIORITY 5: Full citation format: 作者，〈标题〉，《期刊》卷（年）：页码
  if (!result.volume || !result.issue || !result.pages || !result.journal || !result.title) {
    const fullCite = parseCitationFromText(fullText);
    if (fullCite) {
      if (!result.journal && fullCite.journal) result.journal = fullCite.journal;
      if (!result.volume && fullCite.volume) result.volume = fullCite.volume;
      if (!result.year && fullCite.year) result.year = fullCite.year;
      if (!result.pages && fullCite.pages) result.pages = fullCite.pages;
      if (!result.authors && fullCite.author) result.authors = fullCite.author;
      if (!result.title && fullCite.title) result.title = fullCite.title;
      console.log('[PDF] P5 full citation:', fullCite);
    }
  }

  // PRIORITY 6: Journal name in 《》 (standalone, not part of citation)
  if (!result.journal) {
    const journalInText = fullText.match(/《([\u4e00-\u9fff]{2,20})》/);
    if (journalInText) {
      result.journal = journalInText[1];
      console.log('[PDF] P6 journal:', journalInText[1]);
    }
  }

  // PRIORITY 7: Volume-Year with strict journal context
  // Only 《期刊》33（2018）— must be preceded by journal name in 《》
  // This prevents random "Smith (2018)" patterns from setting volume
  if (!result.volume) {
    const volYearWithJournal = fullText.match(/《[^》]{2,20}》\s*(\d+)\s*[（(](\d{4})[）)]/);
    if (volYearWithJournal) {
      result.volume = volYearWithJournal[1];
      if (!result.year) result.year = volYearWithJournal[2];
      console.log('[PDF] P7 vol from 《journal》N(year):', volYearWithJournal[0]);
    }
  }

  // PRIORITY 8: Bare page range (last resort)
  if (!result.pages) {
    const pagesPattern = /(\d{1,4}\s*[-–—]\s*\d{1,4})/g;
    const allPages = [...fullText.matchAll(pagesPattern)];
    if (allPages.length > 0) {
      const lastPages = allPages[allPages.length - 1][1].replace(/\s/g, '');
      const [start, end] = lastPages.split(/[-–—]/).map(Number);
      if (start > 0 && end > start && end < 10000) {
        result.pages = lastPages;
        console.log('[PDF] P8 pages from bare range:', lastPages);
      }
    }
  }
  // Extract page numbers from page headers/footers
  // Taiwan journal pattern: "176 《法制史研究》第三十三期" (even pages)
  //                        "清代中央繫獄諸神考 177" (odd pages)
  if (!result.pages) {
    // Find page numbers before 《journal name》
    const pageBeforeJournal = [...fullText.matchAll(/(\d{2,4})\s*《[^》]{2,20}》/g)]
      .map(m => parseInt(m[1]))
      .filter(n => n >= 10 && n <= 9999);
    // Find page numbers after the paper title
    const titleForPages = result.title || '';
    const pageAfterTitle = titleForPages ?
      [...fullText.matchAll(new RegExp(
        titleForPages.replace(/[.*+?^${}()|[\]\\]/g, '\\$&').substring(0, 20) + '\\s+(\\d{2,4})', 'g'
      ))].map(m => parseInt(m[1])).filter(n => n >= 10 && n <= 9999) : [];

    const allPageNums = [...pageBeforeJournal, ...pageAfterTitle];
    if (allPageNums.length >= 2) {
      const minPage = Math.min(...allPageNums);
      const maxPage = Math.max(...allPageNums);
      if (maxPage > minPage) {
        result.pages = `${minPage}-${maxPage}`;
        console.log('[PDF] Extracted page range from headers:', result.pages, '(from', allPageNums.length, 'page numbers)');
      }
    } else if (allPageNums.length === 1 && pageBeforeJournal.length > 0) {
      // If we only have even-page numbers, estimate starting page as minPage - 1
      // and ending page from the last page text
      result.pages = `${pageBeforeJournal[0] - 1}-?`;
      console.log('[PDF] Partial page info from headers:', result.pages);
    }
  }

  // === STEP 2: Find section boundaries on first page ===
  let abstractLineIdx = -1, keywordsLineIdx = -1, introLineIdx = -1, clcLineIdx = -1;

  for (let i = 0; i < pageLines.length; i++) {
    const t = pageLines[i].text.trim();
    if (abstractLineIdx < 0 && SECTION_MARKERS.abstract.test(t)) abstractLineIdx = i;
    if (keywordsLineIdx < 0 && SECTION_MARKERS.keywords.test(t)) keywordsLineIdx = i;
    if (introLineIdx < 0 && SECTION_MARKERS.intro.test(t)) introLineIdx = i;
    if (clcLineIdx < 0 && SECTION_MARKERS.clc.test(t)) clcLineIdx = i;
  }

  // Header zone ends at the first section marker
  const headerEndIdx = [abstractLineIdx, keywordsLineIdx, introLineIdx, clcLineIdx]
    .filter(idx => idx >= 0)
    .reduce((min, idx) => Math.min(min, idx), pageLines.length);

  // === STEP 3: Analyze header zone for title, authors, journal ===
  const headerLines = pageLines.slice(0, headerEndIdx).map((l, i) => ({ ...l, headerIdx: i }));

  // Filter noise lines
  const meaningfulHeaderLines = headerLines.filter(l => {
    const t = l.text.trim();
    return t.length >= 2 &&
      !/^\d+$/.test(t) &&
      !/^[a-z0-9._%+-]+@[a-z0-9.-]+\./i.test(t) &&
      !/^https?:\/\//i.test(t);
  });

  if (meaningfulHeaderLines.length >= 1) {
    // === Identify TITLE ===
    const fontSizes = meaningfulHeaderLines.map(l => l.fontSize);
    const maxFontSize = Math.max(...fontSizes);
    const avgFontSize = fontSizes.reduce((s, f) => s + f, 0) / fontSizes.length;

    let titleCandidates;
    if (maxFontSize > avgFontSize * 1.15) {
      titleCandidates = meaningfulHeaderLines.filter(l => l.fontSize >= maxFontSize * 0.85);
    } else {
      titleCandidates = meaningfulHeaderLines.slice(0, 3);
    }

    let bestTitle = '';
    let bestTitleHeaderIdx = -1;
    for (const cand of titleCandidates) {
      const t = cand.text.trim();
      if (t.length >= 4 && t.length <= 300 &&
          !/^(DOI|doi|Vol|No|pp|©|copyright|第.*卷|第.*期|文章编号)/i.test(t) &&
          !/\.(pdf|doc)$/i.test(t) &&
          !SECTION_MARKERS.abstract.test(t) && !SECTION_MARKERS.keywords.test(t)) {
        if (t.length > bestTitle.length) {
          bestTitle = t;
          bestTitleHeaderIdx = cand.headerIdx;
        }
      }
    }

    if (bestTitle) {
      result.title = bestTitle;
      const titleOrigIdx = pageLines.indexOf(headerLines[bestTitleHeaderIdx]);
      if (titleOrigIdx >= 0) result.lineRoles[titleOrigIdx] = 'title';
    }

    // === Identify AUTHORS ===
    // Strategy: scan lines AFTER title, BEFORE affiliation/abstract
    // Stop at first affiliation line
    const authorSearchStart = bestTitleHeaderIdx >= 0 ? bestTitleHeaderIdx + 1 : 0;
    let authorParts = [];
    let foundAffiliation = false;

    for (let i = authorSearchStart; i < meaningfulHeaderLines.length; i++) {
      const t = meaningfulHeaderLines[i].text.trim();

      // Stop if we hit an affiliation line (after that, no more authors)
      if (AFFILIATION_PATTERNS.test(t)) {
        foundAffiliation = true;
        continue;
      }

      // Skip section markers and metadata
      if (SECTION_MARKERS.abstract.test(t) || SECTION_MARKERS.keywords.test(t) ||
          SECTION_MARKERS.clc.test(t) || SECTION_MARKERS.doi.test(t) ||
          SECTION_MARKERS.received.test(t)) continue;
      if (/^(DOI|doi|Vol|No|©|文章编号|收稿)/i.test(t)) continue;

      // Use the improved author detection function
      if (isAuthorLine(t)) {
        // Clean superscript numbers and markers
        const cleaned = t
          .replace(/[¹²³⁴⁵⁶⁷⁸⁹⁰]+/g, '')
          .replace(/(?<=[\u4e00-\u9fff])\d+/g, '') // remove digits after Chinese chars
          .replace(/(?<=[a-zA-Z])\d+/g, '') // remove digits after Latin chars
          .replace(/\*+/g, '')
          .replace(/[†‡‡]/g, '')
          .replace(/[、，]/g, ', ')
          .replace(/\s*,\s*,/g, ', ')
          .replace(/^[\s,]+|[\s,]+$/g, '')
          .trim();

        if (cleaned.length >= 2) {
          authorParts.push(cleaned);
          const origIdx = pageLines.indexOf(meaningfulHeaderLines[i]);
          if (origIdx >= 0) result.lineRoles[origIdx] = 'authors';
        }
      }
    }

    if (authorParts.length > 0) {
      result.authors = authorParts.join(', ')
        .replace(/,?\s*and\s+/gi, ', ')
        .replace(/,\s*,/g, ', ')
        .replace(/^[\s,]+|[\s,]+$/g, '')
        .trim();
    }

    // === Identify JOURNAL/SOURCE ===
    for (const l of pageLines) {
      const t = l.text.trim();
      if (!result.journal && isJournalLine(t)) {
        // Extract journal name
        const cnJMatch = t.match(/《([\u4e00-\u9fff\w]+)》/);
        if (cnJMatch) {
          result.journal = cnJMatch[1];
        } else {
          result.journal = t.length > 80 ? t.substring(0, 80) : t;
        }
        const idx = pageLines.indexOf(l);
        if (idx >= 0 && !result.lineRoles[idx]) result.lineRoles[idx] = 'journal';
      }
    }
  }

  // === STEP 4: Mark section boundary lines ===
  if (abstractLineIdx >= 0) result.lineRoles[abstractLineIdx] = 'abstract-marker';
  if (keywordsLineIdx >= 0) result.lineRoles[keywordsLineIdx] = 'keywords-marker';

  // === STEP 5: PDF embedded metadata as fallback ===
  try {
    const meta = await pdf.getMetadata();
    if (meta && meta.info) {
      // Extract year from CreationDate: "D:20180905162812+08'00'" → 2018
      if (!result.year && meta.info.CreationDate) {
        const dateMatch = meta.info.CreationDate.match(/D:(\d{4})/);
        if (dateMatch) {
          const yr = parseInt(dateMatch[1]);
          if (yr >= 1900 && yr <= new Date().getFullYear() + 1) {
            result.year = dateMatch[1];
            console.log('[PDF] Extracted year from CreationDate:', dateMatch[1]);
          }
        }
      }
      // Also try ModDate if CreationDate didn't work
      if (!result.year && meta.info.ModDate) {
        const dateMatch = meta.info.ModDate.match(/D:(\d{4})/);
        if (dateMatch) {
          const yr = parseInt(dateMatch[1]);
          if (yr >= 1900 && yr <= new Date().getFullYear() + 1) {
            result.year = dateMatch[1];
            console.log('[PDF] Extracted year from ModDate:', dateMatch[1]);
          }
        }
      }
      if (!result.title && meta.info.Title) {
        const titleCandidate = meta.info.Title.trim();
        // Reject obvious non-title patterns: Word filenames, Office metadata, generic labels
        const isBadTitle = /\.(pdf|doc|docx|docm|dotx|rtf|wps)$/i.test(titleCandidate) ||
          /^Microsoft Word/i.test(titleCandidate) ||
          /^Untitled/i.test(titleCandidate) ||
          /^(Final|Draft|Copy|Version|Revision|Paper|Article|Thesis)/i.test(titleCandidate) && titleCandidate.length < 20 ||
          /^zz?\d/i.test(titleCandidate) ||
          /^[a-z]-\w{2,4}-/i.test(titleCandidate) && titleCandidate.length < 30;
        if (!isBadTitle && titleCandidate.length >= 3) {
          result.title = titleCandidate;
        }
      }
      if (!result.authors && meta.info.Author) {
        const cleaned = meta.info.Author.trim().replace(/[¹²³⁴⁵⁶⁷⁸⁹⁰\d*†‡]/g, '').trim();
        // Author names should be SHORT — max 60 chars for a name list
        // Reject anything that looks like a sentence or abstract
        // Reject generic/system usernames like "user", "admin", "author", "default"
        const isGenericUser = /^(user|admin|author|default|system|guest|test|unknown|none|n\/a|anonymous)$/i.test(cleaned);
        if (!isGenericUser && cleaned.length >= 2 && cleaned.length <= 60 &&
            !/[。！？]/.test(cleaned) &&
            !sentenceMarkersForPdf.test(cleaned)) {
          result.authors = cleaned;
        }
      }
    }
  } catch(e) {}

  return result;
}

async function loadPdfJs() {
  // Check if pdf.js is already loaded
  if (window.pdfjsLib) return window.pdfjsLib;

  // Load pdf.js from CDN
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';
  // pdf.js v4 is ESM, need to use legacy build instead
  // Let's use the classic script version
  return new Promise((resolve, reject) => {
    // Try loading the legacy (non-module) version
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = () => {
      if (window.pdfjsLib) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        resolve(window.pdfjsLib);
      } else if (typeof pdfjsLib !== 'undefined') {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        resolve(pdfjsLib);
      } else {
        reject(new Error('pdf.js loaded but not accessible'));
      }
    };
    s.onerror = () => reject(new Error('Failed to load pdf.js'));
    document.head.appendChild(s);
  });
}

// ========== Crossref DOI Lookup ==========

async function fetchCrossrefByDoi(doi) {
  const url = `https://api.crossref.org/works/${encodeURIComponent(doi)}`;
  const res = await fetchWithTimeout(url, {
    headers: { 'Accept': 'application/json' }
  }, 15000);
  if (!res.ok) throw new Error(`Crossref API returned ${res.status}`);

  const data = await res.json();
  const item = data.message;

  const metadata = {
    title: '',
    authors: '',
    journal: '',
    year: '',
    volume: '',
    issue: '',
    pages: '',
    doi: doi,
    abstract: '',
    keywords: '',
    type: 'article'
  };

  // Title
  if (item.title && item.title.length > 0) {
    metadata.title = item.title[0].trim();
  }

  // Authors
  if (item.author && item.author.length > 0) {
    metadata.authors = item.author.map(a => {
      if (a.family && a.given) return `${a.given} ${a.family}`;
      if (a.family) return a.family;
      return a.name || '';
    }).join(', ');
  }

  // Journal / container title
  if (item['container-title'] && item['container-title'].length > 0) {
    metadata.journal = item['container-title'][0].trim();
  }

  // Year (published date)
  if (item.published && item.published['date-parts'] && item.published['date-parts'].length > 0) {
    metadata.year = String(item.published['date-parts'][0][0] || '');
  } else if (item.created && item.created['date-parts'] && item.created['date-parts'].length > 0) {
    metadata.year = String(item.created['date-parts'][0][0] || '');
  } else if (item.issued && item.issued['date-parts'] && item.issued['date-parts'].length > 0) {
    metadata.year = String(item.issued['date-parts'][0][0] || '');
  }

  // Volume / Issue / Pages
  metadata.volume = item.volume || '';
  metadata.issue = item.issue || '';
  metadata.pages = item.page || '';

  // Abstract (some Crossref entries include it)
  if (item.abstract) {
    // Strip HTML tags from abstract
    metadata.abstract = item.abstract.replace(/<[^>]+>/g, '').trim();
  }

  // Subject areas (Crossref uses "subject" for what we call keywords)
  if (item.subject && item.subject.length > 0) {
    metadata.keywords = item.subject.join(', ');
  }

  // Type detection
  if (item.type) {
    if (item.type.includes('book') || item.type.includes('monograph')) metadata.type = 'book';
    else if (item.type.includes('proceedings') || item.type.includes('conference')) metadata.type = 'article';
    else metadata.type = 'article';
  }

  // Only return if we got at least a title
  if (metadata.title) return metadata;
  return null;
}

  window._pfLineRoles = {};
  for (let i = 0; i < meaningfulLines.length; i++) {
    const origIdx = pageLines.indexOf(meaningfulLines[i]);

// Render a single text line with its role badge
function pfRenderLine(idx) {
  const lines = window._pfMeaningfulLines || [];
  const line = lines[idx];
  if (!line) return '';
  const role = window._pfLineRoles[idx] || '';
  const rc = PF_ROLE_CONFIG[role] || null;
  const displayText = line.text.trim();
  const truncated = displayText.length > 120 ? displayText.substring(0, 120) + '...' : displayText;

  if (rc) {
    return `<div id="pfLine_${idx}" onclick="pfLineClick(${idx},event)" style="padding:7px 10px;margin:3px 0;background:${rc.bg};border:2px solid ${rc.border};border-radius:8px;font-size:14px;line-height:1.5;cursor:pointer;transition:opacity 0.15s;"
      onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">
      <span style="display:inline-block;padding:2px 7px;border-radius:4px;background:${rc.tagBg};color:${rc.tagColor};font-size:11px;margin-right:6px;">${rc.tag}</span>${truncated}</div>`;
  } else {
    return `<div id="pfLine_${idx}" onclick="pfLineClick(${idx},event)" style="padding:7px 10px;margin:3px 0;background:#f8fafc;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;line-height:1.5;color:#555;cursor:pointer;"
      onmouseover="this.style.background='#eff6ff';this.style.borderColor='#3b82f6'" onmouseout="this.style.background='#f8fafc';this.style.borderColor='#e5e7eb'">${truncated}</div>`;
  }
}

// Re-render a single line in place (without rebuilding entire panel)
function pfRerenderLine(idx) {
  const container = document.getElementById('pfLinesContainer');
  if (!container) return;
  const oldEl = document.getElementById(`pfLine_${idx}`);
  const newHtml = pfRenderLine(idx);
  if (oldEl) {
    oldEl.outerHTML = newHtml;
  } else {
    container.insertAdjacentHTML('beforeend', newHtml);
  }
}

// Update field input visual state
function pfUpdateFieldVisual(fieldKey) {
  const input = document.getElementById(`pf_${fieldKey}`);
  if (!input) return;
  const val = input.value.trim();
  input.style.borderColor = val ? '#d1d5db' : '#fecaca';
  input.style.background = val ? '#fff' : '#fef2f2';
}

// Remove a line's text contribution from a field
function pfRemoveLineFromField(fieldKey, lineText) {
  const input = document.getElementById(`pf_${fieldKey}`);
  if (!input) return;
  let currentVal = input.value.trim();
  if (!currentVal) return;

  if (fieldKey === 'authors') {
    // Authors are comma-separated: remove the matching part
    let parts = currentVal.split(/,\s*/).filter(p => p.trim());
    parts = parts.filter(p => p.trim() !== lineText.trim());
    currentVal = parts.join(', ');
  } else {
    // For other fields, remove the text and clean up
    currentVal = currentVal.replace(lineText, '').replace(/\s{2,}/g, ' ')
      .replace(/^[,，。；;：:\s]+|[,，。；;：:\s]+$/g, '').trim();
  }

  input.value = currentVal;
  window._pickerFields[fieldKey] = currentVal;
  pfUpdateFieldVisual(fieldKey);
}

// Update pre-fill status
function pfUpdateStatus() {
  const keys = ['title','authors','journal','year','volume','issue','pages','doi','abstract','keywords'];
  const filledCount = keys.filter(k => {
    const el = document.getElementById(`pf_${k}`);
    return el && el.value.trim();
  }).length;
  const statusEl = document.getElementById('pfStatus');
  if (!statusEl) return;
  const color = filledCount >= 4 ? '#16a34a' : (filledCount >= 2 ? '#f59e0b' : '#dc2626');
  const text = filledCount >= 4 ? `✅ 已预填 ${filledCount} 个字段，请确认修正` : (filledCount >= 2 ? `⚠️ 预填 ${filledCount} 个字段，部分需手动补充` : `❌ 仅预填 ${filledCount} 个字段，建议使用搜索功能`);
  statusEl.style.color = color;
  statusEl.textContent = text;
}

// ========== Line click-to-assign (v2: with reassignment + clear) ==========

function pfLineClick(idx, e) {
  if (e) e.stopPropagation();
  _pfClickedLineIdx = idx;
  const menu = document.getElementById('pfLineMenu');
  if (!menu) return;

  // Position menu near the clicked line
  const clickedEl = e.currentTarget;
  const rect = clickedEl.getBoundingClientRect();
  menu.style.display = 'block';

  const menuWidth = 320;
  const menuHeight = 180;
  let left = rect.right + 6;
  let top = rect.top;
  if (left + menuWidth > window.innerWidth) left = Math.max(8, rect.left);
  if (top + menuHeight > window.innerHeight) top = Math.max(8, window.innerHeight - menuHeight - 10);
  menu.style.left = left + 'px';
  menu.style.top = top + 'px';

  // Highlight clicked line
  clickedEl.style.outline = '2px solid #3b82f6';
  setTimeout(() => { const el = document.getElementById(`pfLine_${idx}`); if (el) el.style.outline = ''; }, 2000);

  // Update menu: show current role and clear button
  const currentRole = window._pfLineRoles[idx] || '';
  const menuTitle = document.getElementById('pfMenuTitle');
  const clearBtnWrap = document.getElementById('pfClearBtnWrap');

  if (currentRole) {
    const rc = PF_ROLE_CONFIG[currentRole];
    menuTitle.innerHTML = `当前标记：<span style="display:inline-block;padding:2px 7px;border-radius:4px;background:${rc.tagBg};color:${rc.tagColor};font-size:11px;">${rc.tag}</span> — 点击下方重新分配或清除：`;
    clearBtnWrap.style.display = 'block';
    // Highlight current role button
    document.querySelectorAll('.pf-menu-btn').forEach(btn => {
      if (btn.dataset.field === currentRole) {
        btn.style.outline = '2px solid #3b82f6';
        btn.style.fontWeight = '700';
      } else {
        btn.style.outline = '';
        btn.style.fontWeight = '500';
      }
    });
  } else {
    menuTitle.textContent = '分配到字段（可多次选择不同行，自动追加）：';
    clearBtnWrap.style.display = 'none';
    document.querySelectorAll('.pf-menu-btn').forEach(btn => {
      btn.style.outline = '';
      btn.style.fontWeight = '500';
    });
  }
}

function pfAssignLine(field, e) {
  if (e) e.stopPropagation();
  if (_pfClickedLineIdx < 0) return;
  const lines = window._pfMeaningfulLines || [];
  const line = lines[_pfClickedLineIdx];
  if (!line) return;
  const newText = line.text.trim();

  // If this line already has a role, first remove it from the old field
  const oldRole = window._pfLineRoles[_pfClickedLineIdx] || '';
  if (oldRole && oldRole !== field) {
    pfRemoveLineFromField(oldRole, newText);
  }

  // If same role, do nothing (already assigned)
  if (oldRole === field) {
    pfCloseLineMenu();
    return;
  }

  // Add to new field (with append logic)
  const input = document.getElementById(`pf_${field}`);
  const currentVal = input ? input.value.trim() : (window._pickerFields[field] || '');

  let combined;
  if (currentVal && currentVal !== newText) {
    if (currentVal.includes(newText)) {
      combined = currentVal;
    } else {
      if (field === 'authors') {
        combined = currentVal.replace(/[,，]\s*$/, '') + ', ' + newText;
      } else {
        combined = currentVal + ' ' + newText;
      }
    }
  } else {
    combined = newText;
  }

  window._pickerFields[field] = combined;
  if (input) {
    input.value = combined;
    pfUpdateFieldVisual(field);
  }

  // Update line role
  window._pfLineRoles[_pfClickedLineIdx] = field;

  // Re-render the line
  pfRerenderLine(_pfClickedLineIdx);

  // Update status
  pfUpdateStatus();

  pfCloseLineMenu();
  showToast(`已分配到「${PF_FIELD_LABELS[field] || field}」`, 'success');
}

function pfClearLineRole(e) {
  if (e) e.stopPropagation();
  if (_pfClickedLineIdx < 0) return;
  const lines = window._pfMeaningfulLines || [];
  const line = lines[_pfClickedLineIdx];
  if (!line) return;

  const oldRole = window._pfLineRoles[_pfClickedLineIdx] || '';
  if (oldRole) {
    pfRemoveLineFromField(oldRole, line.text.trim());
    window._pfLineRoles[_pfClickedLineIdx] = '';
    pfRerenderLine(_pfClickedLineIdx);
    pfUpdateStatus();
    showToast('已清除标记', 'success');
  }

  pfCloseLineMenu();
}

function pfCloseLineMenu(e) {
  if (e) e.stopPropagation();
  const menu = document.getElementById('pfLineMenu');
  if (menu) menu.style.display = 'none';
  _pfClickedLineIdx = -1;
}

// ========== Search functions (with event.stopPropagation to prevent overlay close) ==========

async function pfSearchDoi(e) {
  if (e) e.stopPropagation();
  const doi = (document.getElementById('pf_doi_input') || {}).value?.trim() || '';
  if (!doi) { showToast('请输入DOI', 'error'); return; }

  const resDiv = document.getElementById('pfSearchRes');
  resDiv.innerHTML = '<span style="color:#3b82f6;">⏳ 查询 Crossref...</span>';

  try {
    const meta = await fetchCrossrefByDoi(doi);
    if (meta) {
      pfUpdateAllFields(meta);
      resDiv.innerHTML = '<span style="color:#16a34a;">✅ 查询成功！字段已更新</span>';
    } else {
      resDiv.innerHTML = '<span style="color:#dc2626;">❌ 未找到该DOI</span>';
    }
  } catch(err) {
    resDiv.innerHTML = `<span style="color:#dc2626;">❌ 查询失败: ${err.message}</span>`;
  }
}

async function pfSearchTitle(e) {
  if (e) e.stopPropagation();
  const query = (document.getElementById('pf_title_input') || {}).value?.trim() || '';
  if (!query) { showToast('请输入标题', 'error'); return; }

  const resDiv = document.getElementById('pfSearchRes');
  resDiv.innerHTML = '<span style="color:#8b5cf6;">⏳ 搜索 Semantic Scholar...</span>';

  try {
    const url = `https://api.semanticscholar.org/graph/v1/paper/search?query=${encodeURIComponent(query)}&limit=5&fields=title,authors,year,venue,externalIds,abstract`;
    const res = await fetchWithTimeout(url, {}, 15000);
    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    const papers = data.data || [];
    if (!papers.length) { resDiv.innerHTML = '<span style="color:#dc2626;">❌ 未找到文献</span>'; return; }

    let html = '<div style="margin-top:4px;"><p style="font-weight:600;font-size:12px;margin:2px 0;">点击选择：</p>';
    for (let i = 0; i < Math.min(papers.length, 5); i++) {
      const p = papers[i];
      const aStr = (p.authors||[]).map(a=>a.name||'').filter(n=>n).join(', ');
      html += `<div onclick="pfSelectPaper(${i},event)" style="padding:7px 10px;margin:4px 0;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;cursor:pointer;font-size:12px;"
        onmouseover="this.style.background='#eff6ff'" onmouseout="this.style.background='#f8fafc'">
        <b>${p.title||'无标题'}</b><br>
        <span style="color:#666;">${aStr}${p.venue?' · '+p.venue:''}${p.year?' ('+p.year+')':''}</span>
        ${p.externalIds?.DOI?`<span style="color:#3b82f6;font-size:11px;">DOI: ${p.externalIds.DOI}</span>`:''}
      </div>`;
    }
    html += '</div>';
    resDiv.innerHTML = html;
    window._pfPapers = papers;
  } catch(err) {
    resDiv.innerHTML = `<span style="color:#dc2626;">❌ 搜索失败: ${err.message}</span>`;
  }
}

function pfSelectPaper(idx, e) {
  if (e) e.stopPropagation();
  const p = (window._pfPapers || [])[idx];
  if (!p) return;

  const meta = {
    title: p.title || '', authors: (p.authors||[]).map(a=>a.name||'').filter(n=>n).join(', '),
    journal: p.venue || '', year: p.year ? String(p.year) : '',
    doi: p.externalIds?.DOI || '', abstract: p.abstract || '',
    volume: '', issue: '', pages: '', keywords: ''
  };

  // Try Crossref for more details if DOI available
  if (meta.doi) {
    fetchCrossrefByDoi(meta.doi).then(cr => {
      if (cr) {
        for (const k of ['volume','issue','pages','keywords','journal']) {
          if (cr[k] && !meta[k]) meta[k] = cr[k];
        }
      }
      pfUpdateAllFields(meta);
    }).catch(() => pfUpdateAllFields(meta));
  } else {
    pfUpdateAllFields(meta);
  }
}

function pfUpdateAllFields(meta) {
  const keys = ['title','authors','journal','year','volume','issue','pages','doi','abstract','keywords'];
  for (const k of keys) {
    window._pickerFields[k] = meta[k] || '';
    const el = document.getElementById(`pf_${k}`);
    if (el) { el.value = meta[k] || ''; el.style.borderColor = '#d1d5db'; el.style.background = '#fff'; }
  }
  // Clear all line roles since API results replace field values entirely
  if (window._pfLineRoles) {
    for (const idx in window._pfLineRoles) {
      if (window._pfLineRoles[idx]) {
        window._pfLineRoles[idx] = '';
        pfRerenderLine(parseInt(idx));
      }
    }
  }
  pfUpdateStatus();
  const resDiv = document.getElementById('pfSearchRes');
  if (resDiv) resDiv.innerHTML = '<span style="color:#16a34a;">✅ 已更新！请确认后点击"确认填入表单"</span>';
  showToast('信息已更新', 'success');
}

function applyPickerFields() {
  const metadata = {};
  const keys = ['title','authors','journal','year','volume','issue','pages','doi','abstract','keywords'];
  for (const k of keys) {
    const el = document.getElementById(`pf_${k}`);
    metadata[k] = el ? el.value.trim() : (window._pickerFields[k] || '');

  if (lineMenu) lineMenu.remove();

  fillFormFromMetadata(metadata);

  setTimeout(() => autoEnrichAndReview(metadata), 300);
}

function cancelPdfPreview() {
  const overlay = document.getElementById('pdfPreviewOverlay');
  if (overlay) overlay.remove();
  const lineMenu = document.getElementById('pfLineMenu');
  if (lineMenu) lineMenu.remove();
}

function fillFormFromMetadata(metadata) {
  // Determine the best type
  let type = 'article';
  if (metadata.journal || metadata.doi || metadata.volume) type = 'article';

  // Set type selector
  const typeSelect = document.getElementById('formType');
  if (typeSelect) {
    typeSelect.value = type;
    renderFormByType(type, null);
  }

  // Wait a tick for form to render, then fill fields
  setTimeout(() => {
    const fieldMap = {
      'title': 'field_title',
      'authors': 'field_authors',
      'journal': 'field_journal',
      'year': 'field_year',
      'volume': 'field_volume',
      'issue': 'field_issue',
      'pages': 'field_pages',
      'doi': 'field_doi',
      'abstract': 'field_abstract',
      'keywords': 'field_keywords'

      const el = document.getElementById(fieldId);
      if (el && metadata[metaKey]) {
        el.value = metadata[metaKey];
      }

}

// Reconstruct OpenAlex abstract from inverted index format
function reconstructOpenAlexAbstract(invertedIndex) {
  if (!invertedIndex || typeof invertedIndex !== 'object') return '';
  const positions = {};
  let maxIdx = 0;
  for (const [word, idxs] of Object.entries(invertedIndex)) {
    if (Array.isArray(idxs)) {
      idxs.forEach(i => { positions[i] = word; if (i > maxIdx) maxIdx = i; });
    }
  }
  const words = [];
  for (let i = 0; i <= maxIdx; i++) words.push(positions[i] || '');
  return words.join(' ').replace(/\s+/g, ' ').trim();
}

// Suggest category from all available data
function suggestCategory(metadata, apiData) {
  // 1. Semantic Scholar s2FieldsOfStudy
  if (apiData.s2FieldsOfStudy && apiData.s2FieldsOfStudy.length > 0) {
    const field = apiData.s2FieldsOfStudy[0].category || apiData.s2FieldsOfStudy[0];
    if (FIELD_OF_STUDY_MAP[field]) return FIELD_OF_STUDY_MAP[field];
    if (typeof field === 'string' && field.length > 0) return field;
  }

  // 2. OpenAlex concepts (highest priority after S2 — broad global coverage)
  if (apiData.openalexConcepts && apiData.openalexConcepts.length > 0) {
    for (const concept of apiData.openalexConcepts) {
      if (OPENALEX_CONCEPT_MAP[concept]) return OPENALEX_CONCEPT_MAP[concept];
    }
    // Also try partial match
    for (const concept of apiData.openalexConcepts) {
      for (const [en, cn] of Object.entries(OPENALEX_CONCEPT_MAP)) {
        if (concept.toLowerCase().includes(en.toLowerCase())) return cn;
      }
    }
  }

  // 3. Crossref subjects
  if (apiData.crossrefSubjects && apiData.crossrefSubjects.length > 0) {
    for (const subj of apiData.crossrefSubjects) {
      if (CROSSREF_SUBJECT_MAP[subj]) return CROSSREF_SUBJECT_MAP[subj];
    }
    return apiData.crossrefSubjects[0];
  }

  // 4. Google Books categories (for books)
  if (apiData.googleBooksCategories && apiData.googleBooksCategories.length > 0) {
    for (const cat of apiData.googleBooksCategories) {
      if (GOOGLEBOOKS_CATEGORY_MAP[cat]) return GOOGLEBOOKS_CATEGORY_MAP[cat];
      // Try partial match
      for (const [en, cn] of Object.entries(GOOGLEBOOKS_CATEGORY_MAP)) {
        if (cat.toLowerCase().includes(en.toLowerCase())) return cn;
      }
    }
  }

  // 5. Chinese keyword inference from title + keywords + abstract + journal
  const text = `${metadata.title || ''} ${metadata.keywords || ''} ${metadata.abstract || ''} ${metadata.journal || ''}`;
  const scores = {};
  for (const [cat, keywords] of Object.entries(CN_CATEGORY_KEYWORDS)) {
    scores[cat] = 0;
    for (const kw of keywords) {
      if (text.includes(kw)) scores[cat]++;
    }
  }
  const sorted = Object.entries(scores).filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]);
  if (sorted.length > 0) return sorted[0][0];

  // 6. Journal name inference
  if (metadata.journal) {
    if (/史|历史/.test(metadata.journal)) return '历史学';
    if (/文学|文摘|文艺/.test(metadata.journal)) return '文学';
    if (/哲/.test(metadata.journal)) return '哲学';
    if (/经济|金融|贸易/.test(metadata.journal)) return '经济学';
    if (/法学|法律/.test(metadata.journal)) return '法学';
    if (/社会/.test(metadata.journal)) return '社会学';
    if (/教育/.test(metadata.journal)) return '教育学';
    if (/艺术|美术|音乐/.test(metadata.journal)) return '艺术学';
    if (/语言|外语/.test(metadata.journal)) return '语言学';
    if (/宗教/.test(metadata.journal)) return '宗教学';
    if (/军事|兵/.test(metadata.journal)) return '军事学';
  }

  return '';
}

// Suggest tags from all available data
function suggestTags(metadata, apiData) {
  const tags = new Set();

  // From keywords
  if (metadata.keywords) {
    metadata.keywords.split(/[,，;；、\n]+/).forEach(kw => {
      const t = kw.trim();
      if (t.length >= 2 && t.length <= 20) tags.add(t);
    });
  }

  // From Crossref subjects (short ones only)
  if (apiData.crossrefSubjects) {
    apiData.crossrefSubjects.forEach(s => {
      if (s.length <= 25) tags.add(s);
    });
  }

  // From Semantic Scholar fieldsOfStudy (Chinese mapped)
  if (apiData.s2FieldsOfStudy) {
    apiData.s2FieldsOfStudy.forEach(f => {
      const field = typeof f === 'string' ? f : (f.category || '');
      if (field) {
        const mapped = FIELD_OF_STUDY_MAP[field] || field;
        tags.add(mapped);
      }
    });
  }

  // From OpenAlex concepts (Chinese mapped, top 5)
  if (apiData.openalexConcepts) {
    apiData.openalexConcepts.slice(0, 5).forEach(concept => {
      const mapped = OPENALEX_CONCEPT_MAP[concept];
      if (mapped) {
        tags.add(mapped);
      } else if (concept && concept.length <= 20) {
        tags.add(concept);
      }
    });
  }

  // From OpenAlex topics (more specific than concepts)
  if (apiData.openalexTopics) {
    apiData.openalexTopics.slice(0, 3).forEach(topic => {
      if (topic && topic.length <= 25) tags.add(topic);
    });
  }

  // From Google Books categories
  if (apiData.googleBooksCategories) {
    apiData.googleBooksCategories.forEach(cat => {
      const mapped = GOOGLEBOOKS_CATEGORY_MAP[cat];
      if (mapped) {
        tags.add(mapped);
      } else if (cat && cat.length <= 20) {
        tags.add(cat);
      }
    });
  }

  // From year
  if (metadata.year) tags.add(metadata.year + '年');

  // From journal (short name)
  if (metadata.journal) {
    const shortName = metadata.journal.replace(/["《》]/g, '').trim();
    if (shortName.length >= 2 && shortName.length <= 12) tags.add(shortName);
  }

  // From type
  if (metadata.type === 'article') tags.add('学术论文');
  else if (metadata.type === 'book') tags.add('书籍');

  return Array.from(tags).slice(0, 12);
}

// Helper: fetch with timeout (fallback if AbortSignal.timeout is unavailable)
function fetchWithTimeout(url, options = {}, timeoutMs = 10000) {
  const controller = new AbortController();
  const timerId = setTimeout(() => controller.abort(), timeoutMs);
  return fetch(url, { ...options, signal: controller.signal })
    .then(res => { clearTimeout(timerId); return res; })
    .catch(err => { clearTimeout(timerId); throw err; });
}

      console.log('[Enrichment] Trying Cloudflare Worker proxy for', targetUrl.substring(0, 80));
      const workerUrl = `${CORS_PROXY_WORKER_URL}/?url=${encodeURIComponent(targetUrl)}`;
      const res = await fetchWithTimeout(workerUrl, {}, timeoutMs);
      if (res.ok) {
        const text = await res.text();
        // Check for valid content: not empty, not error JSON, not Cloudflare error page
        if (text.length > 50 && !text.startsWith('{"error"') && !isCloudflareErrorPage(text)) {
          return new Response(text, {
            status: 200,
            headers: { 'Content-Type': res.headers.get('Content-Type') || 'text/html; charset=utf-8' }
          });
        }
        console.log('[Enrichment] Cloudflare Worker returned error/CF-block/empty for', targetUrl.substring(0, 60));
      }
    } catch(e) {
      console.log('[Enrichment] Cloudflare Worker failed:', e.message);
    }
  }

  // 2. Try public CORS proxies as fallback
  const proxies = [
    (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    (url) => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(url)}`,
    (url) => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
    (url) => `https://thingproxy.freeboard.io/fetch/${url}`,
  ];
  let lastErr = null;
  for (let i = 0; i < proxies.length; i++) {
    try {
      console.log('[Enrichment] Trying public proxy', i + 1, 'for', targetUrl.substring(0, 80));
      const res = await fetchWithTimeout(proxies[i](targetUrl), {}, timeoutMs);
      if (res.ok) {
        const text = await res.text();
        if (text.length > 100 && !isCloudflareErrorPage(text)) {
          return new Response(text, {
            status: 200,
            headers: { 'Content-Type': res.headers.get('Content-Type') || 'text/html; charset=utf-8' }
          });
        }
        lastErr = new Error(`Proxy ${i+1}: returned too short or blocked content (${text.length} chars)`);
      } else {
        lastErr = new Error(`Proxy ${i+1}: HTTP ${res.status}`);
      }
    } catch(e) {
      lastErr = e;
      console.log('[Enrichment] Proxy', i + 1, 'failed:', e.message);
    }
  }
  throw lastErr || new Error('All CORS proxies failed');
}

// === IHp Sinica (史语所) Academic Journal Search ===
// Parse ihp.sinica.edu.tw article detail page HTML to extract full metadata
// IHp Sinica is a key data source for Taiwan academic papers in history/philology
function parseIhpSinicaArticle(html) {
  const result = {};
  try {
    // Extract title (Chinese + English)
    const titleMatch = html.match(/清代中央繫獄諸神考|<h[^>]*>([^<]+)</) || [];
    // More robust: look for the article title section
    const articleTitleMatch = html.match(/####\s*([^<\n]+)\s+(.*?)\s*$/m);
    if (articleTitleMatch) {
      result.title_cn = articleTitleMatch[1].trim();
      result.title_en = articleTitleMatch[2].trim();
    }
    // Alternative: extract from the main content area
    const headingMatch = html.match(/<h[1-6][^>]*class[^>]*>([\s\S]*?)<\/h[1-6]>/);
    // Use DOMParser-style regex to extract structured fields
    // Author extraction
    const authorMatch = html.match(/作\s*者[：:]\s*([\s\S]*?)(?:期別|出版|摘要|<)/);
    if (authorMatch) {
      const authorBlock = authorMatch[1].trim();
      // Split Chinese and English author names
      const authorLines = authorBlock.split(/\n+/).map(l => l.trim()).filter(l => l.length > 0);
      result.author_cn = authorLines[0] || '';
      result.author_en = authorLines.slice(1).join(' ').replace(/[\n\r]/g, ' ').trim();
    }
    // Volume/pages extraction
    const volMatch = html.match(/期別頁碼[：:]\s*(\d+)\s*[：:]\s*([\d]+-[\d]+)/);
    if (volMatch) {
      result.volume = volMatch[1];
      result.pages = volMatch[2];
    }
    // Publication date
    const dateMatch = html.match(/出版時間[：:]\s*([\d]+\/[\d]+)/);
    if (dateMatch) {
      result.pub_date = dateMatch[1];
    }
    // Abstract extraction (Chinese + English)
    const abstractMatch = html.match(/摘要\s*([\s\S]*?)(?:關鍵詞|Keywords|<\/div>)/);
    if (abstractMatch) {
      result.abstract = abstractMatch[1].trim().replace(/<[^>]+>/g, '').substring(0, 500);
    }
    // Keywords extraction
    const kwMatch = html.match(/關鍵詞\s*([\s\S]*?)(?:引用|References|<\/div>)/);
    if (kwMatch) {
      result.keywords = kwMatch[1].trim().replace(/<[^>]+>/g, '');
    }
    // Journal name from page title
    const journalMatch = html.match(/<title[^>]*>([^<]+)｜/);
    if (journalMatch) {
      result.journal = journalMatch[1].trim();
    }
  } catch(e) {
    console.log('[Enrichment] IHp Sinica parse error:', e.message);
  }
  return result;
}

// Helper: compare two titles for similarity (0~1)
// Uses character-bigram matching for Chinese + token Jaccard for Latin text
function titleSimilarity(a, b) {
  if (!a || !b) return 0;
  const na = a.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]/g, '');
  const nb = b.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]/g, '');
  if (!na || !nb) return 0;
  if (na === nb) return 1;
  // Check containment (one is substring of the other)
  if (na.includes(nb) || nb.includes(na)) return 0.85;

  // For Chinese text: character-bigram cosine similarity (more accurate than word Jaccard)
  const cnA = na.match(/[\u4e00-\u9fff]+/g) || [];
  const cnB = nb.match(/[\u4e00-\u9fff]+/g) || [];
  let cnScore = 0;
  if (cnA.length > 0 && cnB.length > 0) {
    const bigramsA = new Set();
    for (const seg of cnA) {
      for (let i = 0; i < seg.length - 1; i++) bigramsA.add(seg.substring(i, i + 2));
      if (seg.length === 1) bigramsA.add(seg);
    }
    const bigramsB = new Set();
    for (const seg of cnB) {
      for (let i = 0; i < seg.length - 1; i++) bigramsB.add(seg.substring(i, i + 2));
      if (seg.length === 1) bigramsB.add(seg);
    }
    let inter = 0;
    for (const bg of bigramsA) { if (bigramsB.has(bg)) inter++; }
    const union = bigramsA.size + bigramsB.size - inter;
    cnScore = union > 0 ? inter / union : 0;
  }

  // For Latin text: token-based Jaccard similarity
  const tokensA = new Set(na.match(/[a-z0-9]+/g) || []);
  const tokensB = new Set(nb.match(/[a-z0-9]+/g) || []);
  let inter = 0;
  for (const t of tokensA) { if (tokensB.has(t)) inter++; }
  const union = tokensA.size + tokensB.size - inter;
  const enScore = union > 0 ? inter / union : 0;

  // Weighted combination: if both Chinese and Latin present, use max; otherwise use whichever is available
  if (cnScore > 0 && enScore > 0) return Math.max(cnScore, enScore);
  if (cnScore > 0) return cnScore;
  return enScore;
}

// === Extract citation_* meta tags from a web page ===
// Many academic databases (lawdata.com.tw, airitilibrary.com, etc.) embed standard citation metadata
function extractCitationMeta(htmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(htmlText, 'text/html');
  const meta = {};
  // Standard citation_* meta tags — use exact match for reliability
  const citationFields = [
    'citation_title', 'citation_author', 'citation_publication_date',
    'citation_journal_title', 'citation_issue', 'citation_volume',
    'citation_firstpage', 'citation_lastpage', 'citation_doi',
    'citation_keywords', 'citation_abstract', 'citation_publisher',
    'citation_language', 'citation_journal_issn'
  ];
  for (const field of citationFields) {
    // Try exact match first (most reliable)
    const m = doc.querySelector(`meta[name="${field}"]`);
    if (m) {
      const content = m.getAttribute('content')?.trim();
      if (content) { meta[field] = content; continue; }
    }
    // Try case-insensitive match as fallback
    const allMetas = doc.querySelectorAll('meta[name]');
    for (const am of allMetas) {
      const name = (am.getAttribute('name') || '').toLowerCase();
      if (name === field.toLowerCase()) {
        const content = am.getAttribute('content')?.trim();
        if (content) { meta[field] = content; break; }
      }
    }
  }
  // Also try meta description and keywords as fallback
  const descMeta = doc.querySelector('meta[name="description"]');
  if (descMeta && !meta.description) meta.description = descMeta.getAttribute('content')?.trim() || '';
  const kwMeta = doc.querySelector('meta[name="keywords"]');
  if (kwMeta && !meta.keywords) meta.keywords = kwMeta.getAttribute('content')?.trim() || '';

  // Try to extract journal name from page title if citation_journal_title is missing
  if (!meta.citation_journal_title) {
    const pageTitle = doc.querySelector('title')?.textContent?.trim() || '';
    // lawdata.com.tw page titles often contain the journal name
    // e.g., "清代中央繫獄諸神考- 元照出版, 月旦知識库"
    // Or from the description: "法制史研究:中國法制史學會會刊 201806 (33期)"
    if (meta.description) {
      const journalMatch = meta.description.match(/([\u4e00-\u9fff]+(?:[：:][\u4e00-\u9fff]+)*)\s*\d{4}\s*\(\d+/);
      if (journalMatch) {
        meta.citation_journal_title = journalMatch[1].trim();
      }
    }
  }

  // Only return if we found at least a title or author
  if (meta.citation_title || meta.citation_author) {
    console.log('[Enrichment] Found citation meta:', JSON.stringify(meta).substring(0, 200));
    return meta;
  }
  return null;
}
