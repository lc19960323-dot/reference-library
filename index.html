// === Parse Chinese academic citation from search result descriptions ===
// Example: "陳熙遠，〈清代中央繫獄諸神考〉，《法制史研究》33（2018）：175-238"
function parseCitationFromText(text) {
  const result = {};
  if (!text) return result;
  // Pattern: 作者，〈标题〉，《期刊》卷（年）：页码
  const citePattern = /([^，,]{2,20})[，,]\s*[〈<]([^〉>]+)[〉>][，,]\s*[《<]([^》>]+)[》>][，,]?\s*(\d+)?[（(](\d{4})[）)](?:[：:](\d+[-–—]\d+))?/;
  const m = text.match(citePattern);
  if (m) {
    if (m[1] && m[1].length >= 2 && m[1].length <= 20) result.author = m[1].trim();
    if (m[2]) result.title = m[2].trim();
    if (m[3]) result.journal = m[3].trim();
    if (m[4]) result.volume = m[4];
    if (m[5]) result.year = m[5];
    if (m[6]) result.pages = m[6].replace(/\s/g, '');
    console.log('[Enrichment] Parsed citation from text:', result);
  }
  // Also try to extract year separately
  if (!result.year) {
    const yearMatch = text.match(/(?:19|20)\d{2}/);
    if (yearMatch) result.year = yearMatch[0];
  }
  return result;
}

// Main enrichment function: query APIs IN PARALLEL and gather supplementary data
async function autoEnrichReference(metadata) {
  const enriched = {};      // Fields that are NEW (not in original metadata)
  const corrections = {};   // API-suggested values that DIFFER from user-entered ones
  const apiData = { crossrefSubjects: [], s2FieldsOfStudy: [], tldr: '', citationCount: 0, apiSources: [],
    openalexConcepts: [], openalexTopics: [], googleBooksCategories: [], doubanRating: '', bookRating: '',
    webSearchResults: [], wikipediaSummary: '', wikipediaUrl: '',
    authorProfile: null, authorWebResults: [] };
  let foundSomething = false;

  console.log('[Enrichment] Starting with metadata:', metadata);

  // Build all API queries to run in parallel
  const queries = [];

  // === Simplified/Traditional dual-search ===
  // If the title contains Chinese, also generate a traditional variant for searching
  // This ensures both 简体 and 繁体 resources are found
  const hasChineseTitle = metadata.title && /[\u4e00-\u9fff]/.test(metadata.title);
  const titleVariants = hasChineseTitle ? searchVariants(metadata.title) : [metadata.title];
  const authorVariants = metadata.authors && /[\u4e00-\u9fff]/.test(metadata.authors)
    ? searchVariants(metadata.authors.split(/[,，;；]/)[0].trim())
    : [metadata.authors ? metadata.authors.split(/[,，;；]/)[0].trim() : ''];
  const tradMetadata = hasChineseTitle ? { ...metadata, title: toTraditional(metadata.title), authors: metadata.authors ? toTraditional(metadata.authors) : '' } : null;

  // Query 1: Crossref by DOI
  if (metadata.doi) {
    queries.push({
      name: 'crossref-doi',
      url: `https://api.crossref.org/works/${encodeURIComponent(metadata.doi)}`,
      handler: async (data) => {
        const item = data.message;
        if (!item) return;
        console.log('[Enrichment] Crossref DOI result:', item.title?.[0]);
        apiData.apiSources.push('Crossref(DOI)');
        if (!metadata.title && item.title && item.title[0]) { enriched.title = item.title[0].trim(); foundSomething = true; }
        else if (metadata.title && item.title && item.title[0] && item.title[0].trim() !== metadata.title) { corrections.title = item.title[0].trim(); }
        if (item.author && item.author.length) {
          const authorStr = item.author.map(a => a.family && a.given ? `${a.given} ${a.family}` : (a.family || a.name || '')).filter(n => n).join(', ');
          if (!metadata.authors) { enriched.authors = authorStr; foundSomething = true; }
          else if (authorStr && authorStr !== metadata.authors) { corrections.authors = authorStr; }
        }
        if (item['container-title'] && item['container-title'][0]) {
          if (!metadata.journal) { enriched.journal = item['container-title'][0].trim(); foundSomething = true; }
          else if (item['container-title'][0].trim() !== metadata.journal) { corrections.journal = item['container-title'][0].trim(); }
        }
        const dp = (item.published && item.published['date-parts'] && item.published['date-parts'][0]) ||
                   (item.created && item.created['date-parts'] && item.created['date-parts'][0]) ||
                   (item.issued && item.issued['date-parts'] && item.issued['date-parts'][0]);
        if (dp && dp[0]) {
          if (!metadata.year) { enriched.year = String(dp[0]); foundSomething = true; }
          else if (String(dp[0]) !== metadata.year) { corrections.year = String(dp[0]); }
        }
        if (item.volume) { if (!metadata.volume) { enriched.volume = item.volume; foundSomething = true; } else if (item.volume !== metadata.volume) corrections.volume = item.volume; }
        if (item.issue) { if (!metadata.issue) { enriched.issue = item.issue; foundSomething = true; } else if (item.issue !== metadata.issue) corrections.issue = item.issue; }
        if (item.page) { if (!metadata.pages) { enriched.pages = item.page; foundSomething = true; } else if (item.page !== metadata.pages) corrections.pages = item.page; }
        if (item.abstract) { const abs = item.abstract.replace(/<[^>]+>/g, '').trim(); if (!metadata.abstract) { enriched.abstract = abs; foundSomething = true; } }
        if (item.subject && item.subject.length) apiData.crossrefSubjects = item.subject;
      }
    });
  }

  // Query 2: Semantic Scholar (by DOI or title+author)
  let s2Url = null;
  if (metadata.doi) {
    s2Url = `https://api.semanticscholar.org/graph/v1/paper/DOI:${encodeURIComponent(metadata.doi)}?fields=title,abstract,year,authors,venue,externalIds,fieldsOfStudy,s2FieldsOfStudy,tldr,citationCount`;
  } else if (metadata.title) {
    // Include author in query for better matching
    const s2Query = metadata.authors ? `${metadata.title} ${metadata.authors.split(/[,，]/)[0].trim()}` : metadata.title;
    s2Url = `https://api.semanticscholar.org/graph/v1/paper/search?query=${encodeURIComponent(s2Query)}&limit=1&fields=title,abstract,year,authors,venue,externalIds,fieldsOfStudy,s2FieldsOfStudy,tldr,citationCount`;
  }
  if (s2Url) {
    queries.push({
      name: 'semantic-scholar',
      url: s2Url,
      handler: async (data) => {
        const paper = data.data ? data.data[0] : data;
        if (!paper) return;
        console.log('[Enrichment] S2 result:', paper.title);
        apiData.apiSources.push('Semantic Scholar');
        if (paper.abstract && !enriched.abstract && !metadata.abstract) { enriched.abstract = paper.abstract; foundSomething = true; }
        if (paper.year) { if (!metadata.year && !enriched.year) { enriched.year = String(paper.year); foundSomething = true; } }
        if (paper.venue && !enriched.journal && !metadata.journal) { enriched.journal = paper.venue; foundSomething = true; }
        if (paper.externalIds && paper.externalIds.DOI && !metadata.doi && !enriched.doi) { enriched.doi = paper.externalIds.DOI; foundSomething = true; }
        if (paper.authors && paper.authors.length && !enriched.authors && !metadata.authors) {
          enriched.authors = paper.authors.map(a => a.name || '').filter(n => n).join(', '); foundSomething = true;
        }
        if (paper.fieldsOfStudy) apiData.s2FieldsOfStudy = paper.fieldsOfStudy.map(f => ({ category: f }));
        if (paper.s2FieldsOfStudy) apiData.s2FieldsOfStudy = paper.s2FieldsOfStudy;
        if (paper.tldr && paper.tldr.text) apiData.tldr = paper.tldr.text;
        if (paper.citationCount) apiData.citationCount = paper.citationCount;
      }
    });
  }

  // Query 3: Crossref title search (only if no DOI) — use author & journal to improve matching
  if (!metadata.doi && metadata.title) {
    // Build a richer query: title + author + journal for better matching
    let crossrefUrl = `https://api.crossref.org/works?query.bibliographic=${encodeURIComponent(metadata.title)}&rows=3`;
    if (metadata.authors) crossrefUrl += `&query.author=${encodeURIComponent(metadata.authors.split(/[,，]/)[0].trim())}`;
    if (metadata.journal) crossrefUrl += `&query.container-title=${encodeURIComponent(metadata.journal)}`;

    queries.push({
      name: 'crossref-title',
      url: crossrefUrl,
      handler: async (data) => {
        if (!data.message || !data.message.items || !data.message.items.length) return;
        // Find the best matching item by comparing titles
        let bestItem = null;
        let bestScore = 0;
        for (const item of data.message.items) {
          const itemTitle = (item.title && item.title[0]) || '';
          const score = titleSimilarity(metadata.title, itemTitle);
          if (score > bestScore) { bestScore = score; bestItem = item; }
        }
        if (!bestItem || bestScore < 0.2) {
          console.log('[Enrichment] Crossref title search: no good match (best score:', bestScore, ')');
          return;
        }
        const item = bestItem;
        console.log('[Enrichment] Crossref title result (score ' + bestScore.toFixed(2) + '):', item.title?.[0]);
        apiData.apiSources.push('Crossref(标题)');
        if (item.DOI && !enriched.doi) { enriched.doi = item.DOI; foundSomething = true; }
        if (item['container-title'] && item['container-title'][0] && !enriched.journal && !metadata.journal) { enriched.journal = item['container-title'][0]; foundSomething = true; }
        if (item.volume && !enriched.volume && !metadata.volume) { enriched.volume = item.volume; foundSomething = true; }
        if (item.issue && !enriched.issue && !metadata.issue) { enriched.issue = item.issue; foundSomething = true; }
        if (item.page && !enriched.pages && !metadata.pages) { enriched.pages = item.page; foundSomething = true; }
        const dp = (item.published && item.published['date-parts'] && item.published['date-parts'][0]) ||
                   (item.issued && item.issued['date-parts'] && item.issued['date-parts'][0]);
        if (dp && dp[0] && !enriched.year && !metadata.year) { enriched.year = String(dp[0]); foundSomething = true; }
        if (item.abstract && !enriched.abstract && !metadata.abstract) { enriched.abstract = item.abstract.replace(/<[^>]+>/g, '').trim(); foundSomething = true; }
        if (item.subject && item.subject.length) apiData.crossrefSubjects = item.subject;
        // Also try to fill authors if missing
        if (item.author && item.author.length && !enriched.authors && !metadata.authors) {
          enriched.authors = item.author.map(a => a.family && a.given ? `${a.given} ${a.family}` : (a.family || a.name || '')).filter(n => n).join(', ');
          foundSomething = true;
        }
      }
    });
  }

  // Query 4: OpenAlex (free comprehensive academic database, covers 250M+ works globally)
  if (metadata.doi || metadata.title) {
    let openalexUrl;
    if (metadata.doi) {
      openalexUrl = `https://api.openalex.org/works/doi:${encodeURIComponent(metadata.doi)}`;
    } else {
      openalexUrl = `https://api.openalex.org/works?search=${encodeURIComponent(metadata.title)}&per_page=1`;
    }
    queries.push({
      name: 'OpenAlex',
      url: openalexUrl,
      handler: async (data) => {
        const work = data.results ? data.results[0] : data;
        if (!work) return;
        // Title similarity check for search results (not DOI lookups)
        if (!metadata.doi && work.title) {
          const score = titleSimilarity(metadata.title, work.title);
          if (score < 0.2) {
            console.log('[Enrichment] OpenAlex: no good match (score:', score.toFixed(2), ')');
            return;
          }
        }
        console.log('[Enrichment] OpenAlex result:', work.title);
        apiData.apiSources.push('OpenAlex');
        // Reconstruct abstract from inverted index
        if (work.abstract_inverted_index && !enriched.abstract && !metadata.abstract) {
          const abs = reconstructOpenAlexAbstract(work.abstract_inverted_index);
          if (abs) { enriched.abstract = abs; foundSomething = true; }
        }
        // Authors
        if (work.authorships && work.authorships.length && !enriched.authors && !metadata.authors) {
          enriched.authors = work.authorships.map(a => a.author?.display_name || '').filter(n => n).join(', ');
          foundSomething = true;
        }
        // Year
        if (work.publication_year && !enriched.year && !metadata.year) {
          enriched.year = String(work.publication_year); foundSomething = true;
        }
        // Venue/journal
        if (work.primary_location?.source?.display_name && !enriched.journal && !metadata.journal) {
          enriched.journal = work.primary_location.source.display_name; foundSomething = true;
        }
        // DOI
        if (work.doi && !enriched.doi && !metadata.doi) {
          enriched.doi = work.doi.replace('https://doi.org/', ''); foundSomething = true;
        }
        // Volume, issue, pages
        if (work.biblio?.volume && !enriched.volume && !metadata.volume) { enriched.volume = work.biblio.volume; foundSomething = true; }
        if (work.biblio?.issue && !enriched.issue && !metadata.issue) { enriched.issue = work.biblio.issue; foundSomething = true; }
        if (work.biblio?.first_page && !enriched.pages && !metadata.pages) {
          enriched.pages = work.biblio.first_page + (work.biblio.last_page ? '-' + work.biblio.last_page : '');
          foundSomething = true;
        }
        // Concepts (for category/tag inference)
        if (work.concepts && work.concepts.length) {
          apiData.openalexConcepts = work.concepts.filter(c => (c.score || 0) > 0.3).map(c => c.display_name).slice(0, 10);
        }
        // Topics (newer OpenAlex API field)
        if (work.topics && work.topics.length) {
          apiData.openalexTopics = work.topics.slice(0, 5).map(t => t.display_name);
        }
        // Citation count (use the higher one)
        if (work.cited_by_count && work.cited_by_count > (apiData.citationCount || 0)) {
          apiData.citationCount = work.cited_by_count;
        }
        // Keywords
        if (work.keywords && work.keywords.length && !enriched.keywords && !metadata.keywords) {
          enriched.keywords = work.keywords.map(k => k.keyword).slice(0, 8).join(', ');
          foundSomething = true;
        }
      }
    });
  }

  // Query 5: Google Books (for books — free, no API key needed)
  if (metadata.title) {
    let gbooksQuery = metadata.title;
    if (metadata.authors) gbooksQuery += ' ' + metadata.authors.split(/[,，]/)[0].trim();
    const gbooksUrl = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(gbooksQuery)}&maxResults=1`;
    queries.push({
      name: 'Google Books',
      url: gbooksUrl,
      handler: async (data) => {
        if (!data.items || !data.items.length) return;
        const vol = data.items[0].volumeInfo;
        if (!vol) return;
        // Title similarity check
        if (vol.title) {
          const score = titleSimilarity(metadata.title, vol.title);
          if (score < 0.2) {
            console.log('[Enrichment] Google Books: no good match (score:', score.toFixed(2), ')');
            return;
          }
        }
        console.log('[Enrichment] Google Books result:', vol.title);
        apiData.apiSources.push('Google Books');
        if (vol.authors && vol.authors.length && !enriched.authors && !metadata.authors) {
          enriched.authors = vol.authors.join(', '); foundSomething = true;
        }
        if (vol.publishedDate) {
          const yr = vol.publishedDate.match(/(\d{4})/)?.[1];
          if (yr && !enriched.year && !metadata.year) { enriched.year = yr; foundSomething = true; }
        }
        if (vol.publisher && !enriched.journal && !metadata.journal) {
          // For books, publisher goes in journal field as fallback
          enriched.journal = vol.publisher; foundSomething = true;
        }
        if (vol.description && !enriched.abstract && !metadata.abstract) {
          enriched.abstract = vol.description; foundSomething = true;
        }
        if (vol.categories && vol.categories.length) {
          apiData.googleBooksCategories = vol.categories;
        }
        if (vol.averageRating) {
          apiData.bookRating = `Google Books: ${vol.averageRating}/5`;
        }
        // ISBN
        if (vol.industryIdentifiers) {
          const isbn = vol.industryIdentifiers.find(i => i.type === 'ISBN_13' || i.type === 'ISBN_10');
          if (isbn && !enriched.doi && !metadata.doi && !enriched.keywords && !metadata.keywords) {
            // Store ISBN in keywords as a reference tag
            enriched.keywords = `ISBN: ${isbn.identifier}`;
            foundSomething = true;
          }
        }
      }
    });
  }

  // Query 6: Douban Books search (Chinese books — via CORS proxy)
  if (metadata.title) {
    const doubanSuggestUrl = `https://book.douban.com/j/subject_suggest?q=${encodeURIComponent(metadata.title)}`;
    queries.push({
      name: 'Douban',
      url: doubanSuggestUrl,
      useProxy: true,
      handler: async (data) => {
        // Douban suggest API returns a JSON array
        if (!Array.isArray(data) || data.length === 0) return;
        // Find best matching result
        let bestItem = null;
        let bestScore = 0;
        for (const item of data) {
          if (item.title) {
            const score = titleSimilarity(metadata.title, item.title);
            if (score > bestScore) { bestScore = score; bestItem = item; }
          }
        }
        if (!bestItem || bestScore < 0.2) {
          console.log('[Enrichment] Douban: no good match (best score:', bestScore.toFixed(2), ')');
          return;
        }
        console.log('[Enrichment] Douban result:', bestItem.title);
        apiData.apiSources.push('Douban');
        // Author
        if (bestItem.author && !enriched.authors && !metadata.authors) {
          // Douban author format: "作者名" or "作者名 / 作者名2"
          const authorStr = bestItem.author.split('/')[0].trim();
          if (authorStr) { enriched.authors = authorStr; foundSomething = true; }
        }
        // Year
        if (bestItem.year) {
          const yr = bestItem.year.match(/(\d{4})/)?.[1];
          if (yr && !enriched.year && !metadata.year) { enriched.year = yr; foundSomething = true; }
        }
        // Publisher
        if (bestItem.publisher && !enriched.journal && !metadata.journal) {
          enriched.journal = bestItem.publisher; foundSomething = true;
        }
        // Rating (Douban sometimes returns rating in the suggest API)
        if (bestItem.rating) {
          apiData.doubanRating = `Douban: ${bestItem.rating}`;
          if (!apiData.bookRating) apiData.bookRating = apiData.doubanRating;
        }
      }
    });
  }

  // Query 7: Wikipedia (Chinese + English) — CORS-friendly with origin=*
  // Good for finding books, authors, concepts, and getting summaries
  if (metadata.title) {
    const wikiQuery = metadata.authors
      ? `${metadata.title} ${metadata.authors.split(/[,，]/)[0].trim()}`
      : metadata.title;
    // Try Chinese Wikipedia first
    queries.push({
      name: 'Wikipedia(中文)',
      url: `https://zh.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(wikiQuery)}&srlimit=1&format=json&origin=*`,
      handler: async (data) => {
        if (!data.query || !data.query.search || !data.query.search.length) return;
        const page = data.query.search[0];
        const score = titleSimilarity(metadata.title, page.title);
        if (score < 0.15) {
          console.log('[Enrichment] Wikipedia ZH: no good match (score:', score.toFixed(2), ')');
          return;
        }
        console.log('[Enrichment] Wikipedia ZH result:', page.title);
        apiData.apiSources.push('维基百科(中文)');
        // Fetch the page extract (intro summary)
        try {
          const extractUrl = `https://zh.wikipedia.org/w/api.php?action=query&prop=extracts&exintro&explaintext&titles=${encodeURIComponent(page.title)}&format=json&origin=*`;
          const extRes = await fetchWithTimeout(extractUrl, {}, 8000);
          if (extRes.ok) {
            const extData = await extRes.json();
            const pages = extData.query?.pages || {};
            const firstPage = Object.values(pages)[0];
            if (firstPage?.extract) {
              const extract = firstPage.extract.trim();
              if (extract && !enriched.abstract && !metadata.abstract) {
                enriched.abstract = extract.substring(0, 500) + (extract.length > 500 ? '...' : '');
                foundSomething = true;
              }
              apiData.wikipediaSummary = extract.substring(0, 300);
            }
          }
        } catch (e) { /* extract fetch failed, that's ok */ }
        apiData.wikipediaUrl = `https://zh.wikipedia.org/wiki/${encodeURIComponent(page.title)}`;
      }
    });
    // Also try English Wikipedia
    queries.push({
      name: 'Wikipedia(EN)',
      url: `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(wikiQuery)}&srlimit=1&format=json&origin=*`,
      handler: async (data) => {
        if (!data.query || !data.query.search || !data.query.search.length) return;
        const page = data.query.search[0];
        const score = titleSimilarity(metadata.title, page.title);
        if (score < 0.15) {
          console.log('[Enrichment] Wikipedia EN: no good match (score:', score.toFixed(2), ')');
          return;
        }
        console.log('[Enrichment] Wikipedia EN result:', page.title);
        if (!apiData.apiSources.includes('Wikipedia(EN)')) apiData.apiSources.push('Wikipedia(EN)');
        try {
          const extractUrl = `https://en.wikipedia.org/w/api.php?action=query&prop=extracts&exintro&explaintext&titles=${encodeURIComponent(page.title)}&format=json&origin=*`;
          const extRes = await fetchWithTimeout(extractUrl, {}, 8000);
          if (extRes.ok) {
            const extData = await extRes.json();
            const pages = extData.query?.pages || {};
            const firstPage = Object.values(pages)[0];
            if (firstPage?.extract) {
              const extract = firstPage.extract.trim();
              if (extract && !enriched.abstract && !metadata.abstract && !apiData.wikipediaSummary) {
                enriched.abstract = extract.substring(0, 500) + (extract.length > 500 ? '...' : '');
                foundSomething = true;
              }
              if (!apiData.wikipediaSummary) apiData.wikipediaSummary = extract.substring(0, 300);
            }
          }
        } catch (e) { /* ok */ }
        if (!apiData.wikipediaUrl) apiData.wikipediaUrl = `https://en.wikipedia.org/wiki/${encodeURIComponent(page.title)}`;
      }
    });
  }

  // Query 8: Open Library (free book database — CORS-friendly)
  if (metadata.title) {
    let olQuery = metadata.title;
    if (metadata.authors) olQuery += ' ' + metadata.authors.split(/[,，]/)[0].trim();
    queries.push({
      name: 'Open Library',
      url: `https://openlibrary.org/search.json?q=${encodeURIComponent(olQuery)}&limit=1`,
      handler: async (data) => {
        if (!data.docs || !data.docs.length) return;
        const doc = data.docs[0];
        if (doc.title) {
          const score = titleSimilarity(metadata.title, doc.title);
          if (score < 0.2) {
            console.log('[Enrichment] Open Library: no good match (score:', score.toFixed(2), ')');
            return;
          }
        }
        console.log('[Enrichment] Open Library result:', doc.title);
        apiData.apiSources.push('Open Library');
        if (doc.author_name && doc.author_name.length && !enriched.authors && !metadata.authors) {
          enriched.authors = doc.author_name.join(', '); foundSomething = true;
        }
        if (doc.first_publish_year && !enriched.year && !metadata.year) {
          enriched.year = String(doc.first_publish_year); foundSomething = true;
        }
        if (doc.publisher && doc.publisher.length && !enriched.journal && !metadata.journal) {
          enriched.journal = doc.publisher[0]; foundSomething = true;
        }
        if (doc.isbn && doc.isbn.length && !enriched.keywords && !metadata.keywords) {
          enriched.keywords = `ISBN: ${doc.isbn[0]}`; foundSomething = true;
        }
        if (doc.subject && doc.subject.length) {
          apiData.googleBooksCategories = apiData.googleBooksCategories.concat(doc.subject.slice(0, 5));
        }
      }
    });
  }

  // Query 9: OpenAlex Works search + academic search links
  // Bing RSS is completely broken (returns random results). OpenAlex is CORS-friendly.
  if (metadata.title) {
    let webQuery = metadata.title;
    if (metadata.authors) webQuery += ' ' + metadata.authors.split(/[,，]/)[0].trim();
    queries.push({
      name: 'OpenAlex论文搜索',
      url: 'skip',
      handler: async () => {
        const results = await searchOpenAlexWorks(webQuery, 10);
        const firstAuthor = metadata.authors ? metadata.authors.split(/[,，]/)[0].trim() : '';

        // FILTER OpenAlex results by title similarity to avoid irrelevant matches
        // Only keep results that share meaningful overlap with the paper title
        const filteredResults = results.filter(r => {
          if (!r.title) return false;
          const score = titleSimilarity(metadata.title, r.title);
          // Also check if author name appears in the result
          const authorMatch = firstAuthor && r.snippet && r.snippet.includes(firstAuthor);
          return score >= 0.15 || authorMatch;
        });
        console.log(`[Enrichment] OpenAlex works: ${results.length} raw → ${filteredResults.length} after relevance filter`);

        // Search links are always relevant (they're just links to search engines)
        const searchLinks = generatePaperSearchLinks(metadata.title, firstAuthor);
        const allResults = [...filteredResults, ...searchLinks];
        if (allResults.length > 0) {
          apiData.apiSources.push('OpenAlex论文搜索');
          apiData.webSearchResults = allResults;
          foundSomething = true;
        }
        // Extract structured metadata from the BEST matching OpenAlex result
        for (const r of filteredResults) {
          if (r._meta) {
            const m = r._meta;
            if (m.authors && !enriched.authors && !metadata.authors) { enriched.authors = m.authors; foundSomething = true; }
            if (m.year && !enriched.year && !metadata.year) { enriched.year = m.year; foundSomething = true; }
            if (m.journal && !enriched.journal && !metadata.journal) { enriched.journal = m.journal; foundSomething = true; }
            if (m.volume && !enriched.volume && !metadata.volume) { enriched.volume = m.volume; foundSomething = true; }
            if (m.issue && !enriched.issue && !metadata.issue) { enriched.issue = m.issue; foundSomething = true; }
            if (m.pages && !enriched.pages && !metadata.pages) { enriched.pages = m.pages; foundSomething = true; }
            if (m.doi && !enriched.doi && !metadata.doi) { enriched.doi = m.doi; foundSomething = true; }
          }
        }
        // Try to fetch academic pages for citation_* meta tags (lawdata, airiti, etc.)
        const domainPriority = {
          'lawdata.com.tw': 1, 'airitilibrary.com': 2,
          'tandfonline.com': 3, 'jstor.org': 3, 'cambridge.org': 3,
          'springer.com': 3, 'wiley.com': 3, 'sciencedirect.com': 3,
          'muse.jhu.edu': 3, 'cnki.com.cn': 3, 'wanfangdata.com.cn': 3,
          'ir.sinica.edu.tw': 4,
        };
        const academicUrls = filteredResults
          .map(r => r.url)
          .filter(url => Object.keys(domainPriority).some(d => url.includes(d)))
          .filter(url => !url.endsWith('.pdf'))
          .filter((url, idx, arr) => arr.findIndex(u => u.split('?')[0] === url.split('?')[0]) === idx)
          .slice(0, 3);
        for (const pageUrl of academicUrls) {
          try {
            const meta = await tryExtractFromUrl(pageUrl, 10000);
            if (meta) {
              apiData.apiSources.push('网页元数据提取');
              if (meta.citation_title && !enriched.title && !metadata.title) { enriched.title = meta.citation_title; foundSomething = true; }
              if (meta.citation_author && !enriched.authors && !metadata.authors) { enriched.authors = meta.citation_author; foundSomething = true; }
              if (meta.citation_journal_title && !enriched.journal && !metadata.journal) { enriched.journal = meta.citation_journal_title; foundSomething = true; }
              if (meta.citation_publication_date) {
                const yr = meta.citation_publication_date.match(/(\d{4})/)?.[1];
                if (yr && !enriched.year && !metadata.year) { enriched.year = yr; foundSomething = true; }
              }
              if (meta.citation_volume && !enriched.volume && !metadata.volume) { enriched.volume = meta.citation_volume; foundSomething = true; }
              if (meta.citation_issue && !enriched.issue && !metadata.issue) { enriched.issue = meta.citation_issue; foundSomething = true; }
              if (meta.citation_firstpage) {
                const pages = meta.citation_firstpage + (meta.citation_lastpage ? '-' + meta.citation_lastpage : '');
                if (!enriched.pages && !metadata.pages) { enriched.pages = pages; foundSomething = true; }
              }
              if (meta.citation_doi && !enriched.doi && !metadata.doi) { enriched.doi = meta.citation_doi; foundSomething = true; }
              if (meta.citation_keywords && !enriched.keywords && !metadata.keywords) { enriched.keywords = meta.citation_keywords; foundSomething = true; }
              if (meta.citation_abstract && !enriched.abstract && !metadata.abstract) { enriched.abstract = meta.citation_abstract; foundSomething = true; }
              break;
            }
          } catch (e) { /* try next URL */ }
        }
      }
    });
  }

  // Query 10: REMOVED (Google HTML search — Google returns CAPTCHA, replaced by Bing RSS above)

  // Query 11: OpenAlex Author search — find author's academic profile & search their works
  // This addresses "以作者姓名检索本人的学术网页"
  if (metadata.authors) {
    const firstAuthor = metadata.authors.split(/[,，;；]/)[0].trim();
    if (firstAuthor.length >= 2) {
      queries.push({
        name: 'OpenAlex(作者档案)',
        url: `https://api.openalex.org/authors?search=${encodeURIComponent(firstAuthor)}&per_page=3&mailto=research@example.com`,
        handler: async (data) => {
          if (!data.results || !data.results.length) return;
          // Find best matching author by name similarity
          let bestAuthor = null;
          let bestScore = 0;
          for (const a of data.results) {
            const score = titleSimilarity(firstAuthor, a.display_name || '');
            if (score > bestScore) { bestScore = score; bestAuthor = a; }
          }
          if (!bestAuthor || bestScore < 0.3) {
            // If no good name match, just use the first result
            bestAuthor = data.results[0];
          }
          console.log('[Enrichment] OpenAlex author:', bestAuthor.display_name, '(score:', bestScore.toFixed(2), ')');
          apiData.apiSources.push('OpenAlex(作者档案)');
          foundSomething = true;
          // Store author profile
          apiData.authorProfile = {
            name: bestAuthor.display_name || '',
            worksCount: bestAuthor.works_count || 0,
            citedByCount: bestAuthor.cited_by_count || 0,
            affiliation: (bestAuthor.affiliations && bestAuthor.affiliations[0]) ? bestAuthor.affiliations[0].display_name : '',
            profileUrl: bestAuthor.id || '',
            homepage: bestAuthor.homepage_url || '',
          };
          // If we have a title, search this author's works for a match
          if (metadata.title && bestAuthor.id) {
            try {
              const authorId = bestAuthor.id.replace('https://openalex.org/', '');
              const worksUrl = `https://api.openalex.org/works?filter=author.id:${authorId}&search=${encodeURIComponent(metadata.title)}&per_page=1&mailto=research@example.com`;
              const worksRes = await fetchWithTimeout(worksUrl, {}, 10000);
              if (worksRes.ok) {
                const worksData = await worksRes.json();
                if (worksData.results && worksData.results.length) {
                  const work = worksData.results[0];
                  const score = titleSimilarity(metadata.title, work.title || '');
                  if (score >= 0.2) {
                    console.log('[Enrichment] Found in author works (score:', score.toFixed(2), '):', work.title);
                    if (!apiData.apiSources.includes('OpenAlex(作者作品)')) apiData.apiSources.push('OpenAlex(作者作品)');
                    // Fill in missing fields from this work
                    if (work.publication_year && !enriched.year && !metadata.year) { enriched.year = String(work.publication_year); foundSomething = true; }
                    if (work.doi && !enriched.doi && !metadata.doi) { enriched.doi = work.doi.replace('https://doi.org/', ''); foundSomething = true; }
                    if (work.primary_location?.source?.display_name && !enriched.journal && !metadata.journal) { enriched.journal = work.primary_location.source.display_name; foundSomething = true; }
                    if (work.abstract_inverted_index && !enriched.abstract && !metadata.abstract) {
                      const abs = reconstructOpenAlexAbstract(work.abstract_inverted_index);
                      if (abs) { enriched.abstract = abs; foundSomething = true; }
                    }
                    if (work.biblio?.volume && !enriched.volume && !metadata.volume) { enriched.volume = work.biblio.volume; foundSomething = true; }
                    if (work.biblio?.issue && !enriched.issue && !metadata.issue) { enriched.issue = work.biblio.issue; foundSomething = true; }
                    if (work.biblio?.first_page && !enriched.pages && !metadata.pages) {
                      enriched.pages = work.biblio.first_page + (work.biblio.last_page ? '-' + work.biblio.last_page : '');
                      foundSomething = true;
                    }
                    if (work.cited_by_count && work.cited_by_count > (apiData.citationCount || 0)) {
                      apiData.citationCount = work.cited_by_count;
                    }
                    if (work.concepts && work.concepts.length) {
                      apiData.openalexConcepts = work.concepts.filter(c => (c.score || 0) > 0.3).map(c => c.display_name).slice(0, 10);
                    }
                  }
                }
              }
            } catch(e) { console.log('[Enrichment] Author works search failed:', e.message); }
          }
        }
      });
    }
  }

  // Query 12: Author academic homepage search via OpenAlex + academic links
  // NOTE: Bing RSS search is broken (returns random results), so we use OpenAlex API instead
  if (metadata.authors) {
    const firstAuthor = metadata.authors.split(/[,，;；]/)[0].trim();
    if (firstAuthor.length >= 2) {
      queries.push({
        name: '作者学术主页搜索',
        url: 'skip',
        handler: async () => {
          const results = [];

          // 1. Search OpenAlex for author and fetch their recent works
          try {
            const authorSearchUrl = `https://api.openalex.org/authors?search=${encodeURIComponent(firstAuthor)}&per_page=1&mailto=research@example.com`;
            const authorRes = await fetchWithTimeout(authorSearchUrl, {}, 10000);
            if (authorRes.ok) {
              const authorData = await authorRes.json();
              if (authorData.results && authorData.results.length > 0) {
                const author = authorData.results[0];
                const authorId = author.id.replace('https://openalex.org/', '');
                console.log('[Enrichment] Found author on OpenAlex:', author.display_name, 'ID:', authorId);

                // Fetch author's recent works
                const worksUrl = `https://api.openalex.org/works?filter=author.id:${authorId}&per_page=5&sort=publication_date:desc&mailto=research@example.com`;
                const worksRes = await fetchWithTimeout(worksUrl, {}, 10000);
                if (worksRes.ok) {
                  const worksData = await worksRes.json();
                  for (const work of (worksData.results || [])) {
                    const title = work.title || '';
                    let workUrl = work.doi || '';
                    if (!workUrl && work.primary_location && work.primary_location.landing_page) {
                      workUrl = work.primary_location.landing_page.url || '';
                    }
                    if (!workUrl) workUrl = work.id || '';
                    const year = work.publication_year || '';
                    const venue = (work.primary_location && work.primary_location.source) ? (work.primary_location.source.display_name || '') : '';
                    const cited = work.cited_by_count || 0;
                    const snippetParts = [];
                    if (year) snippetParts.push(String(year));
                    if (venue) snippetParts.push(venue);
                    if (cited) snippetParts.push(`被引${cited}次`);
                    const snippet = snippetParts.join(' · ');
                    if (title) {
                      results.push({ title, url: workUrl, snippet, engine: 'OpenAlex(作者作品)' });
                    }
                  }
                  console.log('[Enrichment] Author works from OpenAlex:', results.length, 'works');
                }
              }
            }
          } catch(e) {
            console.log('[Enrichment] OpenAlex author works search failed:', e.message);
          }

          // 2. Generate direct academic search/profile links
          const encName = encodeURIComponent(firstAuthor);
          const academicLinks = [
            { title: `Google Scholar 搜索「${firstAuthor}」`, url: `https://scholar.google.com/scholar?q=${encName}`, snippet: '在 Google Scholar 上搜索此作者的论文', engine: '学术搜索链接' },
            { title: `Google Scholar 作者档案搜索「${firstAuthor}」`, url: `https://scholar.google.com/citations?view_op=search_authors&mauthors=${encName}`, snippet: '查找此作者的 Google Scholar 学术档案', engine: '学术搜索链接' },
            { title: `ResearchGate 搜索「${firstAuthor}」`, url: `https://www.researchgate.net/search/authors?q=${encName}`, snippet: '在 ResearchGate 上搜索此作者', engine: '学术搜索链接' },
            { title: `Academia.edu 搜索「${firstAuthor}」`, url: `https://www.academia.edu/search?q=${encName}`, snippet: '在 Academia.edu 上搜索此作者', engine: '学术搜索链接' },
          ];
          results.push(...academicLinks);

          if (results.length > 0) {
            apiData.apiSources.push('作者学术主页搜索');
            apiData.authorWebResults = results;
            console.log('[Enrichment] Author web search results:', results.length, 'items');
          }
        }
      });
    }
  }

  // === Simplified/Traditional dual search queries ===
  // For Chinese titles, add parallel queries using the traditional variant
  if (tradMetadata && tradMetadata.title !== metadata.title) {
    // Traditional Chinese OpenAlex search (replaces broken Bing RSS)
    let tradWebQuery = tradMetadata.title;
    if (tradMetadata.authors) tradWebQuery += ' ' + tradMetadata.authors.split(/[,，;；]/)[0].trim();
    queries.push({
      name: 'OpenAlex(繁體)',
      url: 'skip',
      handler: async () => {
        const tradResults = await searchOpenAlexWorks(tradWebQuery, 10);
        // FILTER by title similarity to avoid irrelevant matches
        const tradFiltered = tradResults.filter(r => {
          if (!r.title) return false;
          const score = titleSimilarity(tradMetadata.title, r.title);
          const authorMatch = tradMetadata.authors && r.snippet && r.snippet.includes(tradMetadata.authors.split(/[,，;；]/)[0].trim());
          return score >= 0.15 || authorMatch;
        });
        console.log(`[Enrichment] OpenAlex 繁體: ${tradResults.length} raw → ${tradFiltered.length} after filter`);
        if (tradFiltered.length > 0) {
          apiData.apiSources.push('OpenAlex(繁體)');
          const existing = apiData.webSearchResults || [];
          const seen = new Set(existing.map(r => r.url.split('?')[0]));
          const newResults = tradFiltered.filter(r => !seen.has(r.url.split('?')[0]));
          apiData.webSearchResults = [...existing, ...newResults].slice(0, 15);
          foundSomething = true;
          // Extract metadata from OpenAlex structured data
          for (const r of tradFiltered) {
            if (r._meta) {
              const m = r._meta;
              if (m.journal && !enriched.journal && !metadata.journal) { enriched.journal = m.journal; foundSomething = true; }
              if (m.year && !enriched.year && !metadata.year) { enriched.year = m.year; foundSomething = true; }
              if (m.volume && !enriched.volume && !metadata.volume) { enriched.volume = m.volume; foundSomething = true; }
              if (m.issue && !enriched.issue && !metadata.issue) { enriched.issue = m.issue; foundSomething = true; }
              if (m.pages && !enriched.pages && !metadata.pages) { enriched.pages = m.pages; foundSomething = true; }
              if (m.doi && !enriched.doi && !metadata.doi) { enriched.doi = m.doi; foundSomething = true; }
            }
          }
          // Try to extract citation meta from academic pages
          const academicUrls = tradFiltered
            .map(r => r.url)
            .filter(url => ['lawdata.com.tw', 'airitilibrary.com', 'sinica.edu.tw', 'tandfonline.com', 'jstor.org'].some(d => url.includes(d)))
            .filter(url => !url.endsWith('.pdf'))
            .slice(0, 2);
          for (const pageUrl of academicUrls) {
            try {
              const meta = await tryExtractFromUrl(pageUrl, 10000);
              if (meta) {
                apiData.apiSources.push('网页元数据提取(繁體)');
                if (meta.citation_journal_title && !enriched.journal && !metadata.journal) { enriched.journal = meta.citation_journal_title; foundSomething = true; }
                if (meta.citation_volume && !enriched.volume && !metadata.volume) { enriched.volume = meta.citation_volume; foundSomething = true; }
                if (meta.citation_issue && !enriched.issue && !metadata.issue) { enriched.issue = meta.citation_issue; foundSomething = true; }
                if (meta.citation_firstpage) {
                  const pages = meta.citation_firstpage + (meta.citation_lastpage ? '-' + meta.citation_lastpage : '');
                  if (!enriched.pages && !metadata.pages) { enriched.pages = pages; foundSomething = true; }
                }
                if (meta.citation_publication_date) {
                  const yr = meta.citation_publication_date.match(/(\d{4})/)?.[1];
                  if (yr && !enriched.year && !metadata.year) { enriched.year = yr; foundSomething = true; }
                }
                break;
              }
            } catch (e) { /* try next */ }
          }
        }
      }
    });

    // Traditional Chinese Douban search
    const tradDoubanUrl = `https://book.douban.com/j/subject_suggest?q=${encodeURIComponent(tradMetadata.title)}`;
    queries.push({
      name: 'Douban(繁體)',
      url: tradDoubanUrl,
      useProxy: true,
      handler: async (data) => {
        if (!Array.isArray(data) || data.length === 0) return;
        let bestItem = null, bestScore = 0;
        for (const item of data) {
          if (item.title) {
            const score = titleSimilarity(tradMetadata.title, item.title);
            if (score > bestScore) { bestScore = score; bestItem = item; }
          }
        }
        if (bestItem && bestScore >= 0.2) {
          apiData.apiSources.push('Douban(繁體)');
          if (bestItem.author && !enriched.authors && !metadata.authors) {
            enriched.authors = bestItem.author.split('/')[0].trim(); foundSomething = true;
          }
          if (bestItem.rating && !apiData.bookRating) {
            apiData.doubanRating = `Douban(繁體): ${bestItem.rating}`;
            apiData.bookRating = apiData.doubanRating;
          }
        }
      }
    });

    // Traditional Chinese Wikipedia search
    queries.push({
      name: 'Wikipedia(繁體中文)',
      url: `https://zh.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(tradMetadata.title)}&srlimit=1&format=json&origin=*`,
      handler: async (data) => {
        if (!data.query || !data.query.search || !data.query.search.length) return;
        const page = data.query.search[0];
        const score = titleSimilarity(tradMetadata.title, page.title);
        if (score < 0.15) return;
        apiData.apiSources.push('维基百科(繁體)');
        try {
          const extractUrl = `https://zh.wikipedia.org/w/api.php?action=query&prop=extracts&exintro&explaintext&titles=${encodeURIComponent(page.title)}&format=json&origin=*`;
          const extRes = await fetchWithTimeout(extractUrl, {}, 8000);
          if (extRes.ok) {
            const extData = await extRes.json();
            const pages = extData.query?.pages || {};
            const firstPage = Object.values(pages)[0];
            if (firstPage?.extract && !enriched.abstract && !metadata.abstract && !apiData.wikipediaSummary) {
              enriched.abstract = firstPage.extract.trim().substring(0, 500); foundSomething = true;
              apiData.wikipediaSummary = firstPage.extract.trim().substring(0, 300);
            }
          }
        } catch (e) { /* ok */ }
        if (!apiData.wikipediaUrl) apiData.wikipediaUrl = `https://zh.wikipedia.org/wiki/${encodeURIComponent(page.title)}`;
      }
    });

    // Traditional Chinese OpenAlex search
    if (!metadata.doi) {
      queries.push({
        name: 'OpenAlex(繁體)',
        url: `https://api.openalex.org/works?search=${encodeURIComponent(tradMetadata.title)}&per_page=1`,
        handler: async (data) => {
          const work = data.results ? data.results[0] : data;
          if (!work) return;
          if (work.title) {
            const score = titleSimilarity(tradMetadata.title, work.title);
            if (score < 0.2) return;
          }
          apiData.apiSources.push('OpenAlex(繁體)');
          // Only fill fields that haven't been filled yet
          if (work.abstract_inverted_index && !enriched.abstract && !metadata.abstract) {
            const abs = reconstructOpenAlexAbstract(work.abstract_inverted_index);
            if (abs) { enriched.abstract = abs; foundSomething = true; }
          }
          if (work.authorships && work.authorships.length && !enriched.authors && !metadata.authors) {
            enriched.authors = work.authorships.map(a => a.author?.display_name || '').filter(n => n).join(', '); foundSomething = true;
          }
          if (work.doi && !enriched.doi && !metadata.doi) {
            enriched.doi = work.doi.replace('https://doi.org/', ''); foundSomething = true;
          }
          if (work.cited_by_count && work.cited_by_count > (apiData.citationCount || 0)) {
            apiData.citationCount = work.cited_by_count;
          }
        }
      });
    }

    // Traditional Chinese Crossref title search
    if (!metadata.doi) {
      let tradCrossrefUrl = `https://api.crossref.org/works?query.bibliographic=${encodeURIComponent(tradMetadata.title)}&rows=2`;
      if (tradMetadata.authors) tradCrossrefUrl += `&query.author=${encodeURIComponent(tradMetadata.authors.split(/[,，;；]/)[0].trim())}`;
      queries.push({
        name: 'Crossref(繁體)',
        url: tradCrossrefUrl,
        handler: async (data) => {
          if (!data.message || !data.message.items || !data.message.items.length) return;
          let bestItem = null, bestScore = 0;
          for (const item of data.message.items) {
            const itemTitle = (item.title && item.title[0]) || '';
            const score = titleSimilarity(tradMetadata.title, itemTitle);
            if (score > bestScore) { bestScore = score; bestItem = item; }
          }
          if (!bestItem || bestScore < 0.2) return;
          apiData.apiSources.push('Crossref(繁體)');
          if (bestItem.DOI && !enriched.doi && !metadata.doi) { enriched.doi = bestItem.DOI; foundSomething = true; }
          if (bestItem['container-title'] && bestItem['container-title'][0] && !enriched.journal && !metadata.journal) { enriched.journal = bestItem['container-title'][0]; foundSomething = true; }
          if (bestItem.author && bestItem.author.length && !enriched.authors && !metadata.authors) {
            enriched.authors = bestItem.author.map(a => a.family && a.given ? `${a.given} ${a.family}` : (a.family || '')).filter(n => n).join(', '); foundSomething = true;
          }
        }
      });
    }
  }

  // Query: DuckDuckGo Instant Answer API (CORS-friendly, no proxy needed!)
  // This is our MOST RELIABLE web search — always works, no proxy dependency
  if (metadata.title) {
    let ddgQuery = metadata.title;
    if (metadata.authors) ddgQuery += ' ' + metadata.authors.split(/[,，;；]/)[0].trim();
    queries.push({
      name: 'DuckDuckGo',
      url: `https://api.duckduckgo.com/?q=${encodeURIComponent(ddgQuery)}&format=json&no_html=1&skip_disambig=1`,
      // NOT useProxy — DuckDuckGo API is CORS-friendly!
      handler: async (data) => {
        const results = [];
        // Build a relevance check: title keywords and author name
        const titleLower = (metadata.title || '').toLowerCase();
        const authorLower = metadata.authors ? metadata.authors.split(/[,，;；]/)[0].trim().toLowerCase() : '';
        const titleKeywords = titleLower.split(/[\s,，。、：:；;（）()《》〈〉「」"'']+|/).filter(w => w.length >= 2);
        const isRelevant = (text) => {
          if (!text) return false;
          const tl = text.toLowerCase();
          // Must contain at least one title keyword or the author name
          if (authorLower && tl.includes(authorLower)) return true;
          return titleKeywords.some(kw => tl.includes(kw));
        };

        // Abstract (main answer) — always relevant if present
        if (data.Abstract && data.AbstractURL) {
          results.push({ title: data.AbstractTitle || data.Abstract.substring(0, 80), url: data.AbstractURL, snippet: data.Abstract, engine: 'DuckDuckGo' });
          if (!enriched.abstract && !metadata.abstract) { enriched.abstract = data.Abstract; foundSomething = true; }
        }
        // Related topics — FILTER by relevance to avoid unrelated results
        if (data.RelatedTopics) {
          for (const topic of data.RelatedTopics.slice(0, 8)) {
            if (topic.Text && topic.FirstURL && isRelevant(topic.Text)) {
              results.push({ title: topic.Text.substring(0, 80), url: topic.FirstURL, snippet: topic.Text, engine: 'DuckDuckGo' });
            }
          }
        }
        // Definition — only include if relevant
        if (data.Definition && data.DefinitionURL && isRelevant(data.Definition)) {
          results.push({ title: data.Definition.substring(0, 80), url: data.DefinitionURL, snippet: data.Definition, engine: 'DuckDuckGo' });
        }
        if (results.length > 0) {
          apiData.apiSources.push('DuckDuckGo');
          apiData.webSearchResults = apiData.webSearchResults ? [...apiData.webSearchResults, ...results] : results;
          // Extract year from snippets
          for (const r of results.slice(0, 3)) {
            if (!enriched.year && !metadata.year) {
              const yearMatch = r.snippet.match(/(?:19|20)\d{2}/);
              if (yearMatch) { enriched.year = yearMatch[0]; foundSomething = true; }
            }
          }
          foundSomething = true;
        }
        // DuckDuckGo also returns an Infobox with structured data
        if (data.Infobox && data.Infobox.content) {
          for (const item of data.Infobox.content) {
            if (item.label === 'Year' && item.value && !enriched.year && !metadata.year) {
              enriched.year = String(item.value); foundSomething = true;
            }
            if (item.label === 'Author' && item.value && !enriched.authors && !metadata.authors) {
              enriched.authors = String(item.value); foundSomething = true;
            }
            if (item.label === 'Publisher' && item.value && !enriched.journal && !metadata.journal) {
              enriched.journal = String(item.value); foundSomething = true;
            }
          }
        }
      }
    });
  }

  // Query: IHp Sinica (史语所) — direct search links
  // Bing RSS is broken, ihp.sinica.edu.tw is behind Cloudflare.
  // Generate direct search links for the user to click in their browser.
  if (metadata.title && hasChineseTitle) {
    queries.push({
      name: 'IHp Sinica (史语所)',
      url: 'skip',
      handler: async () => {
        const firstAuthor = metadata.authors ? metadata.authors.split(/[,，;；]/)[0].trim() : '';
        const encQuery = encodeURIComponent((firstAuthor ? firstAuthor + ' ' : '') + metadata.title);
        const links = [
          { title: `Google 搜索中研院史语所「${metadata.title}」`, url: `https://www.google.com/search?q=${encQuery}+site:ihp.sinica.edu.tw`, snippet: '通过 Google 搜索中研院史语所网站上的相关页面', engine: 'IHp Sinica' },
          { title: `Google Scholar 搜索「${metadata.title}」`, url: `https://scholar.google.com/scholar?q=${encQuery}`, snippet: '在 Google Scholar 上搜索此论文', engine: 'IHp Sinica' },
        ];
        apiData.apiSources.push('IHp Sinica (史语所)');
        const existing = apiData.webSearchResults || [];
        const seen = new Set(existing.map(r => r.url.split('?')[0]));
        for (const r of links) {
          if (!seen.has(r.url.split('?')[0])) {
            existing.push(r);
            seen.add(r.url.split('?')[0]);
          }
        }
        apiData.webSearchResults = existing.slice(0, 15);
      }
    });
  }
  const sourceCount = queries.length;
  updateEnrichmentProgress(`正在并行查询 ${sourceCount} 个数据源（含网页搜索）…`);

  const results = await Promise.allSettled(
    queries.map(async (q) => {
      updateEnrichmentProgress(`正在查询 ${q.name}…`);
      // Skip queries that handle their own fetching (e.g., Bing RSS search)
      if (q.url === 'skip') {
        try {
          console.log('[Enrichment] Running self-managed query:', q.name);
          await q.handler(null);
          return q.name;
        } catch(e) {
          console.log('[Enrichment] ' + q.name + ' error:', e.message);
          return q.name + '(error)';
        }
      }
      console.log('[Enrichment] Fetching:', q.name, q.url.substring(0, 100));
      try {
        // Use fetchViaProxy for queries marked with useProxy, regular fetchWithTimeout otherwise
        let res;
        try {
          res = q.useProxy
            ? await fetchViaProxy(q.url, 15000)
            : await fetchWithTimeout(q.url, {}, 15000);
        } catch(proxyErr) {
          // Proxy-based queries (Bing, Google, Douban) often fail — log and skip gracefully
          // DuckDuckGo (no proxy needed) will still work as fallback
          console.log('[Enrichment] ' + q.name + ' proxy/fetch failed:', proxyErr.message);
          return q.name + '(failed)';
        }
        if (!res.ok) { console.log('[Enrichment] ' + q.name + ' returned ' + res.status); return q.name + '(http-' + res.status + ')'; }
        // Handle both JSON and HTML/text responses
        const contentType = res.headers.get('content-type') || '';
        let data;
        if (q.responseType === 'text' || contentType.includes('text/html')) {
          data = await res.text();
          // Validate HTML response isn't an error page
          if (typeof data === 'string' && data.length < 100) {
            console.log('[Enrichment] ' + q.name + ' returned too-short HTML');
            return q.name + '(empty)';
          }
        } else {
          try {
            data = await res.json();
          } catch(jsonErr) {
            // Some APIs (like Douban) may return HTML error pages instead of JSON
            console.log('[Enrichment] ' + q.name + ' JSON parse failed:', jsonErr.message);
            return q.name + '(bad-json)';
          }
        }
        await q.handler(data);
        return q.name;
      } catch(e) {
        console.log('[Enrichment] ' + q.name + ' error:', e.message);
        return q.name + '(error)';
      }
    })
  );

  // Log results
  for (let i = 0; i < results.length; i++) {
    if (results[i].status === 'fulfilled') {
      console.log('[Enrichment] ' + results[i].value + ' succeeded');
    } else {
      console.log('[Enrichment] Query failed:', results[i].reason?.message || results[i].reason);
    }
  }

  // Suggest category and tags based on all available data
  const allData = Object.assign({}, metadata, enriched);
  const suggestedCategory = suggestCategory(allData, apiData);
  const suggestedTags = suggestTags(allData, apiData);

  console.log('[Enrichment] Results:', { enriched, corrections, suggestedCategory, suggestedTags, apiData });

  return { enriched, corrections, apiData, suggestedCategory, suggestedTags, foundSomething, original: metadata };
}

// Show loading indicator during API queries
function showEnrichmentLoading() {
  let overlay = document.getElementById('enrichmentOverlay');
  if (overlay) overlay.remove();

  // Add animation keyframe if not already present
  if (!document.getElementById('enrichAnimStyle')) {
    const style = document.createElement('style');
    style.id = 'enrichAnimStyle';
    style.textContent = '@keyframes enrichProgress { 0%{width:15%;margin-left:0%} 50%{width:50%;margin-left:25%} 100%{width:15%;margin-left:85%} } @keyframes enrichSpin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }';
    document.head.appendChild(style);
  }

  overlay = document.createElement('div');
  overlay.id = 'enrichmentOverlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:10002;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;';

  overlay.innerHTML = `
    <div style="background:#fff;border-radius:16px;padding:32px 40px;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,0.25);">
      <div style="font-size:36px;margin-bottom:12px;display:inline-block;animation:enrichSpin 2s linear infinite;">🔍</div>
      <div style="font-size:16px;font-weight:600;color:#1f2937;margin-bottom:6px;">正在检索文献信息</div>
      <div id="enrichmentProgressText" style="font-size:13px;color:#6b7280;min-height:18px;transition:opacity 0.3s;">正在连接多个学术数据库与网页搜索引擎…</div>
      <div style="margin-top:14px;width:200px;height:4px;background:#e5e7eb;border-radius:2px;overflow:hidden;margin-left:auto;margin-right:auto;">
        <div style="height:100%;background:#3b82f6;border-radius:2px;animation:enrichProgress 1.5s ease-in-out infinite;"></div>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);
}

function hideEnrichmentLoading() {
  const overlay = document.getElementById('enrichmentOverlay');
  if (overlay) overlay.remove();
}

// Show enrichment review panel for user to accept/modify
function showEnrichmentReviewPanel(result) {
  const { enriched, corrections, apiData, suggestedCategory, suggestedTags, foundSomething, original } = result;

  hideEnrichmentLoading();

  let overlay = document.getElementById('enrichmentOverlay');
  if (overlay) overlay.remove();

  overlay = document.createElement('div');
  overlay.id = 'enrichmentOverlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:10002;background:rgba(0,0,0,0.5);display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;';

  const fieldDefs = [
    { key: 'title', label: '标题', icon: '📝' },
    { key: 'authors', label: '作者', icon: '👤' },
    { key: 'journal', label: '期刊', icon: '📖' },
    { key: 'year', label: '年份', icon: '📅' },
    { key: 'volume', label: '卷', icon: '📦' },
    { key: 'issue', label: '期', icon: '📄' },
    { key: 'pages', label: '页码', icon: '🔢' },
    { key: 'doi', label: 'DOI', icon: '🔗' },
    { key: 'abstract', label: '摘要', icon: '📋' },
    { key: 'keywords', label: '关键词', icon: '🏷️' },
  ];

  // Build enriched fields section (new fields the user didn't fill)
  let fieldsHtml = '';
  let enrichedCount = 0;
  for (const fd of fieldDefs) {
    const origVal = original[fd.key] || '';
    const newVal = enriched[fd.key] || '';
    if (newVal) {
      enrichedCount++;
      const displayVal = newVal.length > 200 ? newVal.substring(0, 200) + '...' : newVal;
      const safeVal = displayVal.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      fieldsHtml += `
        <div style="display:flex;align-items:flex-start;gap:8px;padding:8px 10px;margin:4px 0;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;">
          <input type="checkbox" id="enrich_cb_${fd.key}" checked style="margin-top:3px;flex-shrink:0;">
          <div style="flex:1;min-width:0;">
            <div style="font-size:12px;font-weight:600;color:#166534;margin-bottom:2px;">${fd.icon} ${fd.label} <span style="color:#16a34a;font-size:10px;">(新增)</span></div>
            <div style="font-size:13px;color:#15803d;line-height:1.5;">${safeVal}</div>
          </div>
        </div>`;
    }
  }
  if (!fieldsHtml) {
    fieldsHtml = '<div style="padding:12px;text-align:center;color:#9ca3af;font-size:13px;">所有字段已填写，无需补充</div>';
  }

  // Build corrections section (API suggests different values for fields the user already filled)
  let correctionsHtml = '';
  let correctionCount = 0;
  if (corrections) {
    for (const fd of fieldDefs) {
      const origVal = original[fd.key] || '';
      const corrVal = corrections[fd.key] || '';
      if (corrVal && origVal) {
        correctionCount++;
        const displayCorr = corrVal.length > 150 ? corrVal.substring(0, 150) + '...' : corrVal;
        const displayOrig = origVal.length > 80 ? origVal.substring(0, 80) + '...' : origVal;
        const safeCorr = displayCorr.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        const safeOrig = displayOrig.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        correctionsHtml += `
          <div style="display:flex;align-items:flex-start;gap:8px;padding:8px 10px;margin:4px 0;background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;">
            <input type="checkbox" id="enrich_corr_${fd.key}" style="margin-top:3px;flex-shrink:0;">
            <div style="flex:1;min-width:0;">
              <div style="font-size:12px;font-weight:600;color:#92400e;margin-bottom:2px;">${fd.icon} ${fd.label} <span style="color:#d97706;font-size:10px;">(API建议修正)</span></div>
              <div style="font-size:11px;color:#999;margin-bottom:2px;">当前: ${safeOrig}</div>
              <div style="font-size:13px;color:#92400e;line-height:1.5;">建议: ${safeCorr}</div>
            </div>
          </div>`;
      }
    }
  }

  // Build tags section
  let tagsHtml = '';
  if (suggestedTags.length > 0) {
    tagsHtml = suggestedTags.map(tag =>
      `<label style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;margin:3px;background:#e0f2fe;border:1px solid #7dd3fc;border-radius:6px;cursor:pointer;font-size:13px;color:#075985;">
        <input type="checkbox" class="enrich-tag-cb" value="${tag.replace(/"/g,'&quot;').replace(/</g,'&lt;')}" checked style="margin:0;"> ${tag.replace(/</g,'&lt;')}

    <input type="text" id="enrich_category_input" value="${suggestedCategory.replace(/"/g,'&quot;')}" placeholder="未识别到分类，可手动输入"

        <a id="extSearchAiriti" href="https://www.airiti.com/ArticleSearch/?keyword=${searchPrefillEnc}" target="_blank" rel="noopener" style="color:#3b82f6;text-decoration:none;padding:3px 8px;border:1px solid #93c5fd;border-radius:6px;background:#eff6ff;">华艺(AIRiti)</a>

  document.body.appendChild(overlay);
  // Store result for applyEnrichment
  window._enrichmentResult = result;
}

// Apply enrichment to the form
function applyEnrichment(acceptAll) {
  const result = window._enrichmentResult;
  if (!result) { closeEnrichmentPanel(); return; }
  const { enriched, corrections, suggestedCategory, suggestedTags } = result;

  // Apply enriched fields (only to empty form fields — never overwrite user data)
  const fieldKeys = ['title','authors','journal','year','volume','issue','pages','doi','abstract','keywords'];
  let appliedCount = 0;
  for (const key of fieldKeys) {
    if (enriched[key]) {
      const cb = document.getElementById(`enrich_cb_${key}`);
      if (acceptAll || (cb && cb.checked)) {
        const fieldEl = document.getElementById(`field_${key}`);
        if (fieldEl && !fieldEl.value.trim()) {
          fieldEl.value = enriched[key];
          appliedCount++;
        }
      }
    }
  }

  // Apply corrections (overwrite existing fields if user checked the correction checkbox)
  let correctionApplied = 0;
  if (corrections) {
    for (const key of fieldKeys) {
      if (corrections[key]) {
        const cb = document.getElementById(`enrich_corr_${key}`);
        if (acceptAll || (cb && cb.checked)) {
          const fieldEl = document.getElementById(`field_${key}`);
          if (fieldEl) {
            fieldEl.value = corrections[key];
            correctionApplied++;
          }
        }
      }
    }
  }

  // Apply tags (add to tagsInputList, avoid duplicates)
  const tagCheckboxes = document.querySelectorAll('.enrich-tag-cb');
  let tagsAdded = 0;
  tagCheckboxes.forEach(cb => {
    if (acceptAll || cb.checked) {
      const tag = cb.value.trim();
      if (tag && !tagsInputList.includes(tag)) {
        tagsInputList.push(tag);
        tagsAdded++;
      }
    }
  });
  if (tagsAdded > 0) renderTagsInput();

  // Apply category (only if form field is empty)
  const catInput = document.getElementById('enrich_category_input');
  if (catInput) {
    const catValue = catInput.value.trim();
    const fieldCat = document.getElementById('field_category');
    if (catValue && fieldCat && !fieldCat.value.trim()) {
      fieldCat.value = catValue;
    }
  }

  closeEnrichmentPanel();
  const parts = [];
  if (appliedCount > 0) parts.push(`${appliedCount} 个新字段`);
  if (correctionApplied > 0) parts.push(`${correctionApplied} 个修正`);
  if (tagsAdded > 0) parts.push(`${tagsAdded} 个标签`);
  if (suggestedCategory) parts.push('1 个分类');
  showToast(parts.length > 0 ? `已增补 ${parts.join('、')}` : '无新信息需要增补', parts.length > 0 ? 'success' : '');
}

// Re-search with user-modified keywords from the review panel
async function reSearchReferences() {
  const input = document.getElementById('enrichSearchInput');
  const typeSelect = document.getElementById('enrichSearchType');
  if (!input || !input.value.trim()) {
    showToast('请输入搜索关键词', '');
    return;
  }
  const query = input.value.trim();
  const searchType = typeSelect ? typeSelect.value : 'title';

  // Close current panel
  closeEnrichmentPanel();

  // Build metadata from current form values
  const formKeys = ['title','authors','journal','year','volume','issue','pages','doi','abstract','keywords'];
  const metadata = {};
  for (const key of formKeys) {
    const el = document.getElementById(`field_${key}`);
    metadata[key] = el ? el.value.trim() : '';
  }
  // Override based on search type
  if (searchType === 'author') {
    metadata.authors = query;
    metadata.title = ''; // clear title so only author-based searches run
  } else {
    metadata.title = query;
  }

  console.log('[Enrichment] Re-searching with query:', query, 'type:', searchType);

  showEnrichmentLoading();
  try {
    updateEnrichmentProgress('正在用新关键词检索…');
    const result = await autoEnrichReference(metadata);
    showEnrichmentReviewPanel(result);
  } catch (e) {
    console.error('[Enrichment] Re-search error:', e);
    hideEnrichmentLoading();
    showToast('检索失败: ' + (e.message || e), 'error');
  }
}

async function autoEnrichAndReview(metadata) {

  // Need at least a title, DOI, or author name to search

// ========== Douban Import ==========
async function fetchDoubanList(url) {
  // Douban blocks CORS, we need a proxy
  const proxyUrls = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?${encodeURIComponent(url)}`
  ];

  for (const proxyUrl of proxyUrls) {
    try {
      const res = await fetchWithTimeout(proxyUrl, {}, 15000);
      if (res.ok) {
        const html = await res.text();
        return html;
      }
    } catch(e) {
      continue;
    }
  }
  throw new Error('无法访问豆瓣页面，请尝试粘贴 HTML 方式导入');
}

function parseDoubanHtml(html) {
  const books = [];
  // Parse Douban book list HTML
  const doc = new DOMParser().parseFromString(html, 'text/html');

  // Find book items - Douban uses different layouts for different pages
  const items = doc.querySelectorAll('.subject-item, .book-item, li.subject, div.item');
  if (items.length === 0) {
    // Try alternative: look for book links in the page
    const links = doc.querySelectorAll('a[href*="douban.com/subject/"]');
    links.forEach(link => {
      const parent = link.closest('div') || link.parentElement;
      const titleEl = parent?.querySelector('a.title, h2 a, a[href*="/subject/"]');
      const infoEl = parent?.querySelector('.pub, p.pub, span.pub, div.pub, .meta, p.meta');
      const ratingEl = parent?.querySelector('.rating_nums, span.rating_nums');

      if (titleEl) {
        const title = titleEl.textContent.trim().replace(/\s+/g, ' ');
        const info = infoEl ? infoEl.textContent.trim() : '';
        const rating = ratingEl ? ratingEl.textContent.trim() : '';
        const doubanId = (titleEl.getAttribute('href') || '').match(/subject\/(\d+)/)?.[1] || '';

        books.push(parseDoubanBookInfo(title, info, rating, doubanId));
      }
    });
  } else {
    items.forEach(item => {
      const titleEl = item.querySelector('a.title, h2 a, a[href*="/subject/"]');
      const infoEl = item.querySelector('.pub, p.pub, span.pub, div.pub, .meta, p.meta');
      const ratingEl = item.querySelector('.rating_nums, span.rating_nums');

      if (titleEl) {
        const title = titleEl.textContent.trim().replace(/\s+/g, ' ');
        const info = infoEl ? infoEl.textContent.trim() : '';
        const rating = ratingEl ? ratingEl.textContent.trim() : '';
        const doubanId = (titleEl.getAttribute('href') || '').match(/subject\/(\d+)/)?.[1] || '';

        books.push(parseDoubanBookInfo(title, info, rating, doubanId));
      }
    });
  }

  return books;
}

function parseDoubanBookInfo(title, info, rating, doubanId) {
  // Parse Douban's book info format: "作者 / 出版社 / 年 / ISBN / 定价"
  // Or Chinese format: "xxx著 / xxx出版社 / 20xx年 / xxx元"
  const book = {
    title: title.split(' ')[0] || title, // Remove douban subtitle markers
    authors: '',
    publisher: '',
    year: '',
    isbn: '',
    price: '',
    rating: rating,
    doubanId: doubanId,
    doubanUrl: doubanId ? `https://book.douban.com/subject/${doubanId}/` : '',
    type: 'book'
  };

  if (info) {
    const parts = info.split('/').map(p => p.trim());

    for (const part of parts) {
      // Author detection
      if (part.match(/(?:著|编|译|主编|整理|口述|绘|摄影|撰|撰文|执笔)/) ||
          part.match(/[A-Z][a-z]+ [A-Z]/) || // English names
          (part.length <= 20 && !part.match(/^\d/) && !part.match(/出版社|出版|ISBN|定价|¥|￥|元/))) {
        if (!book.authors) book.authors = part;
        else book.authors += ', ' + part;
      }
      // Publisher detection
      else if (part.match(/出版社|出版集团|出版公司|书局|书店/)) {
        book.publisher = part;
      }
      // Year detection
      else if (part.match(/(?:19|20)\d{2}/)) {
        const year = part.match(/((?:19|20)\d{2})/)?.[1];
        if (year) book.year = year;
      }
      // ISBN detection
      else if (part.match(/ISBN/i)) {
        book.isbn = part;
      }
      // Price detection
      else if (part.match(/[¥￥元]/) || part.match(/\d+\.\d+/)) {
        book.price = part;
      }
    }
  }

  return book;
}

async function importDoubanUrl() {
  const urlInput = document.getElementById('doubanUrlInput');
  const url = urlInput?.value.trim();
  if (!url) { showToast('请输入豆瓣豆列 URL', 'error'); return; }

  // Validate URL
  if (!url.includes('douban.com')) { showToast('请输入有效的豆瓣链接', 'error'); return; }

  const btn = document.getElementById('doubanFetchBtn');
  btn.textContent = '获取中...';
  btn.disabled = true;

  try {
    const html = await fetchDoubanList(url);
    const books = parseDoubanHtml(html);

    if (books.length === 0) {
      showToast('未能从该页面解析到书目信息，请尝试粘贴 HTML 方式', 'error');
      btn.textContent = '获取豆列';
      btn.disabled = false;
      return;
    }

    renderDoubanPreview(books);
    showToast(`找到 ${books.length} 本书籍`, 'success');
  } catch(e) {
    showToast('获取失败: ' + e.message, 'error');
  }

  btn.textContent = '获取豆列';
  btn.disabled = false;
}

}

function renderDoubanPreview(books) {
  const preview = document.getElementById('doubanPreview');
  if (!preview) return;

  preview.innerHTML = books.map((book, i) => `
    <div class="douban-book-item" id="doubanBook_${i}">
      <div class="douban-book-info">
        <h4>${escapeHtml(book.title)}</h4>
        <p>作者: ${escapeHtml(book.authors || '未知')} | 出版社: ${escapeHtml(book.publisher || '未知')} | 年份: ${escapeHtml(book.year || '未知')}${book.isbn ? ' | ' + escapeHtml(book.isbn) : ''}</p>
      </div>
      <div class="douban-book-actions">
        <button class="btn btn-sm btn-primary" onclick="importDoubanBook(${i})">导入</button>
      </div>
    </div>
  `).join('') + `
    <div style="text-align:center;margin-top:16px">
      <button class="btn btn-primary" onclick="importAllDoubanBooks()">全部导入 (${books.length})</button>
    </div>
  `;

  // Store books data for import
  window._doubanBooks = books;
}

async function importDoubanBook(index) {
  const book = window._doubanBooks?.[index];
  if (!book) return;

  const ref = {
    id: uuid(),
    type: 'book',
    title: book.title,
    authors: book.authors,
    publisher: book.publisher,
    year: book.year,
    isbn: book.isbn,
    category: '豆瓣书单',
    tags: ['豆瓣'],
    notes: book.doubanUrl ? `豆瓣链接: ${book.doubanUrl}` + (book.rating ? `\n评分: ${book.rating}` : '') : '',
    created_at: new Date().toISOString(),
    updated_at: new Date().toISOString()
  };

  await dbAddOrUpdate(ref);
  allRefs.push(ref);
  showToast(`已导入「${book.title}」`, 'success');
  refreshUI();

  // Update preview to mark as imported
  const item = document.getElementById(`doubanBook_${index}`);
  if (item) {
    item.querySelector('.douban-book-actions').innerHTML = '<span style="color:#22c55e;font-size:13px">✅ 已导入</span>';
  }
}

async function importAllDoubanBooks() {
  const books = window._doubanBooks;
  if (!books || books.length === 0) return;

  let imported = 0;
  for (let i = 0; i < books.length; i++) {
    const book = books[i];
    // Check if already imported by title
    const existing = allRefs.find(r => r.title === book.title && r.type === 'book');
    if (existing) continue;

    const ref = {
      id: uuid(),
      type: 'book',
      title: book.title,
      authors: book.authors,
      publisher: book.publisher,
      year: book.year,
      isbn: book.isbn,
      category: '豆瓣书单',
      tags: ['豆瓣'],
      notes: book.doubanUrl ? `豆瓣链接: ${book.doubanUrl}` + (book.rating ? `\n评分: ${book.rating}` : '') : '',
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString()
    };

    await dbAddOrUpdate(ref);
    allRefs.push(ref);
    imported++;
  }

  showToast(`已导入 ${imported} 本书籍（${books.length - imported} 本已存在）`, 'success');
  refreshUI();
}

  allRefs.forEach(r => {
    (r.tags || []).forEach(t => tagCounts[t] = (tagCounts[t] || 0) + 1);
  });
  const sorted = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]).slice(0, 20);
  const colors = ['#3b82f6','#22c55e','#f59e0b','#a855f7','#ec4899','#06b6d4','#ef4444','#8b5cf6'];
  const html = sorted.map(([tag, count], i) =>
    `<div class="nav-item" data-view="tag" data-filter-tag="${escapeHtml(tag)}" onclick="handleNavClick(this)">
      <span class="tag-dot" style="background:${colors[i % colors.length]}"></span>
      ${escapeHtml(tag)} <span class="count">${count}</span>
    </div>`
  ).join('');
  document.getElementById('tagNav').innerHTML = html || '<div style="padding:8px 12px;font-size:12px;color:var(--text-muted)">暂无标签</div>';
}

    console.error('Init error:', e);
    // Fallback: force localStorage mode
    useLocalStorage = true;
    allRefs = lsGetAll();
    if (allRefs.length === 0 && !localStorage.getItem('reflib_initialized')) {
      for (const ref of SAMPLE_REFS) {
        ref.id = uuid();

        ref.updated_at = ref.created_at;
        allRefs.push(ref);
      }
      lsSaveAll(allRefs);
      localStorage.setItem('reflib_initialized', '1');
    }
    refreshUI();
    startAutoBackup();
    showToast('已加载（使用 localStorage 存储）', 'success');
  }
}

// ========== PWA Support ==========
// Service Worker 注册由 js/integration.js 处理（使用相对路径 ./sw.js）
// 此处仅保留清除旧版 SW 缓存的迁移逻辑
if ('serviceWorker' in navigator && 'caches' in window) {
  // 清除旧版缓存名称（reflib-v2 等），新 SW 使用 reference-library-v2
  caches.keys().then(keys => {
    keys.forEach(key => {
      if (key !== 'reference-library-v2') {
        console.log('[PWA] Clearing old cache:', key);
        caches.delete(key);
      }
    });
  });
}

// PWA Install Prompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('pwaBanner');
  if (banner && !localStorage.getItem('pwa_dismissed')) {
    banner.classList.add('show');
  }
});

document.getElementById('pwaInstallBtn')?.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const result = await deferredPrompt.userChoice;
    if (result.outcome === 'accepted') {
      showToast('应用已安装到桌面', 'success');
    }
    deferredPrompt = null;
    document.getElementById('pwaBanner').classList.remove('show');
  } else {
    showToast('请使用浏览器的"添加到主屏幕"功能安装', 'success');
    document.getElementById('pwaBanner').classList.remove('show');
  }
});

document.getElementById('pwaDismissBtn')?.addEventListener('click', () => {
  document.getElementById('pwaBanner').classList.remove('show');
  localStorage.setItem('pwa_dismissed', '1');
});
</script>
<script type="module" src="./js/integration.js"></script>
</body>
</html>
