<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#2563eb"/>
  <g transform="translate(80,80)" fill="white">
    <!-- Book shape -->
    <rect x="20" y="60" width="160" height="240" rx="8" fill="white" opacity="0.9"/>
    <rect x="30" y="70" width="140" height="20" rx="2" fill="#2563eb" opacity="0.3"/>
    <rect x="30" y="100" width="120" height="12" rx="2" fill="#2563eb" opacity="0.2"/>
    <rect x="30" y="120" width="130" height="12" rx="2" fill="#2563eb" opacity="0.2"/>
    <rect x="30" y="140" width="100" height="12" rx="2" fill="#2563eb" opacity="0.2"/>
    <rect x="30" y="160" width="140" height="12" rx="2" fill="#2563eb" opacity="0.15"/>
    <!-- Second book -->
    <rect x="200" y="80" width="160" height="220" rx="8" fill="white" opacity="0.85"/>
    <rect x="210" y="90" width="140" height="20" rx="2" fill="#2563eb" opacity="0.3"/>
    <rect x="210" y="120" width="120" height="12" rx="2" fill="#2563eb" opacity="0.2"/>
    <rect x="210" y="140" width="130" height="12" rx="2" fill="#2563eb" opacity="0.2"/>
    <rect x="210" y="160" width="100" height="12" rx="2" fill="#2563eb" opacity="0.2"/>
    <rect x="210" y="180" width="140" height="12" rx="2" fill="#2563eb" opacity="0.15"/>
    <!-- Search icon -->
    <circle cx="140" cy="240" r="40" fill="none" stroke="white" stroke-width="12"/>
    <line x1="168" y1="268" x2="200" y2="300" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <!-- Tag badge -->
    <rect x="240" y="240" width="80" height="28" rx="14" fill="#dbeafe"/>
    <text x="280" y="260" text-anchor="middle" font-size="14" fill="#2563eb" font-weight="600">标签</text>
  </g>
</svg>
